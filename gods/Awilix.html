t use the darkness to hunt and revel. As Queen of the Night, she is known; the Goddess of the Moon, Awilix.\\n\\nThey say the sun is her lover, and from his light does she shine, but those that say so have never beheld her. Left unrestrained, the sun burns skin, scorches the land, blinds the eyes. Moonlight does no such thing. Like soft white petals it blankets the night, casting the world into mystical illumination. Never has it brought calamity or ruin, only the chance to see where once there was none. She is no different. Her mysterious radiance needs no other to shine.\\n\\nThese days, the night is less welcoming. Those loyal followers, the jaguars, whose whispered roars bellow into the silence of her domain, prowl at her command. While it is, no doubt, beyond the understanding of mortals, the very moonlight is threatened. A war unlike any before it would end all things. For once that pale white will glimmer on the ugliness of bloodshed, for the night belongs to Awilix.","name":"Awilix","pantheon":"Maya","roles":["Assassin"],"title":"Goddess of the Moon"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Awilix"},"buildId":"c5JK3Pb0METmhIhnKyz0j","assetPrefix":"/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
