kings; breached the gates of the netherworld and relieved the sorrows of the gods. Or so the tales claim.\\n\\nWhat is known is this – two thirds divine and one third mortal, it has ever been Gilgamesh’s desire to be a true god, and that desire has often led him down the wrong path. Though adventurous and brave, he was also a tyrant, imposing his will on his subordinates, until the gods sent the wild man, Enkidu, to teach Gilgamesh the error of his ways.\\n\\nHowever, after a fierce battle, the two demigods became friends. Together, they freed the Cedar Forest from the monstrous Humbaba and slew the Bull of Heaven. They fought monsters and tyrants, and with every victory, Gilgamesh’s renown spread until finally, even the gods took note.\\n\\nBut his deeds, though mighty, were not enough to blind the gods to his overweening pride. Though his friendship with Enkidu had tempered his cruelty, his arrogance was undimmed.\\n\\nAs a consequence, the gods slew Enkidu and Gilgamesh was left alone once more. But with his friend’s death came a new purpose. And so, Gilgamesh set off on his greatest quest – the quest for immortality. He travelled to far lands, and vanished from the sight and knowledge of men.\\n\\nUntil now. Tiamat, the ancient foe of the gods, has returned, and Gilgamesh has returned with her. For if he can unite the pantheons of the world against the dragon queen and defeat her, perhaps the gods will give him what he seeks at last. ","name":"Gilgamesh","pantheon":"Babylonian","roles":["Warrior"],"title":"King Of Uruk"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Gilgamesh"},"buildId":"Y-2VrX9-xfijCkzCPt1bq","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
