smite/god-cards/the-morrigan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/the-morrigan.jpg","lore":"Fate is an unusual thing. An unseen force predicting every action of every being. Some deities can see it, recognizing the flow of the plan. There are none, save one, that claims mastery over it, that manipulates it with such cold intent, that steers it ever toward war and the red demise of heroes. In truth, she is many Goddesses, with many names and many forms. But there is only one title. The Morrigan\\n\\nAnu, Macha, Badb. Individually, these three Goddesses were sisters, progenitors of sovereignty, war, and death. They were caretakers of their lush green Éire, champions for armored soldiers, guides for the deceased. It is unknown what bound them together. Some whispered curse, some lover’s scorn. Some dark power or darker purposes.  But now they are one.\\n\\nShe’s been seen in many shapes. The lurid seductress, the wrinkled hag, the screaming crow, and worst of all, the washer in the river. For those who witness her cleaning their bloody armor prophesies a violent end.\\n\\nSubtle and manipulative, there is no war The Morrigan did not incite. No dying breath she did not collect. Even this war, a war between Gods, must secretly be of her making. So, beware those that behold her, for The Morrigan controls your fate.","name":"The Morrigan","pantheon":"Celtic","roles":["Mage"],"title":"Phantom Queen"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"the-morrigan"},"buildId":"AJYMN08ml0vplKIMqLlwo","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
