<!DOCTYPE html><html><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/120f2e2270820d49a21f.css" as="style"/><link rel="stylesheet" href="/_next/static/css/120f2e2270820d49a21f.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-a54b4f32bdc1ef890ddd.js"></script><script src="/_next/static/chunks/webpack-ddd010a953737b6e3536.js" defer=""></script><script src="/_next/static/chunks/framework-b97a0ed4f13ff8397343.js" defer=""></script><script src="/_next/static/chunks/main-4809d8b3f3ef3c100198.js" defer=""></script><script src="/_next/static/chunks/pages/_app-40e1e24534c61cc4b345.js" defer=""></script><script src="/_next/static/chunks/pages/gods/%5Bname%5D-1203f2c4febd1a2a19da.js" defer=""></script><script src="/_next/static/Y-2VrX9-xfijCkzCPt1bq/_buildManifest.js" defer=""></script><script src="/_next/static/Y-2VrX9-xfijCkzCPt1bq/_ssgManifest.js" defer=""></script></head><body><div id="__next"><div><div>Bellona</div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"god":{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shield-bash.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bludgeon.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/scourge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eagles-rally.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/master-of-war.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/bellona.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/bellona.jpg","lore":"Rome has forgotten her.\\n\\nBellona, the Goddess of War, took no time to build temples or gather worshippers. She favors only those for whom war is life; for that is where she thrives - not on the steps of hallowed basilicas or in whispered prayers, but in the blood-soaked mud, among the breathless armored troops, in the roar of victory.\\n\\nWhen Rome was young, Bellona ran with her armies, conquered her enemies, made her strong. As Rome aged and began to crumble, she fought only with her strongest and most cunning of worshippers, Lucius Cornelius Sulla.\\n\\nSulla rose through the ranks by accomplishing impossible deeds of heroism and ruthless prowess. His enemies feared him, his soldiers loved him, and everywhere he went, Bellona rode with him. Together they quelled the Germanic hordes, they broke the Social War, they sacked Athens. Sulla was utterly undefeatable, and it was the Goddess of War that made him so.\\n\\nBut the Roman Senate moved to displace Sulla and end his rise to glory.\\n\\n\"March on Rome,\" Bellona quietly urged, \"and you shall rise as no other.\"\\n\\nEmboldened, Sulla commanded his legions and took the city streets, Bellona at the fore, slaughtering the gladiator-slaves that stood against them. The Senate buckled. They cast the vote. Sulla became the first life-long dictator of Rome.\\n\\nDuring Sulla's reign, Bellona was worshipped for the Goddess she was. But Sulla had grown old. His wars were over. Bellona moved on, and Rome forgot.\\n\\nBut the forgotten are not gone. Gods clash in titanic conflict. It is in war she thrives. No one will forget Bellona the Goddess of War this time.","name":"Bellona","pantheon":"Roman","roles":["Warrior"],"title":"Goddess of War"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Bellona"},"buildId":"Y-2VrX9-xfijCkzCPt1bq","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
