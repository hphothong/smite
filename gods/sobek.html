n.hirezstudios.com/smite/god-cards/sobek.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/sobek.jpg","lore":"Hunter, guardian, destroyer, menace; the Crocodile God, Sobek, swims where the Nile takes him and owes allegiance to no one.\\n\\nSome say that Sobek was there when only the Dark Waters existed, so he helped create the world. Some say that Sobek made the Nile with his sweat and protects those that travel it if they pay him tribute, otherwise he destroys them. Some say that Sobek ushers the worthy dead down the Nile to the afterlife and aids in their rebirth, restoring sight and strength. Some say he is evil and hateful, ravaging those along the shores and terrorizing villages. Sobek, in truth, is all of these things and none.\\n\\nSobek is not a God of good or evil, of benevolence or malice, but a God of solitary neutrality, unless disturbed; a God that tends to his mighty river and performs his responsibilities to passing souls. The rest of the time, he does what he wishes. For his protection to the living and the dead, he is to be worshipped and respected. For his power, ferocity, and ruthlessness, he is to be rightfully feared.","name":"Sobek","pantheon":"Egyptian","roles":["Guardian"],"title":"God of the Nile"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"sobek"},"buildId":"hN0gb234rEgFhtKllIB2L","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
