m/smite/god-cards/persephone.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/persephone.jpg","lore":"Persephone is the Goddess of Vegetation and the Harvest. Daughter of Zeus and Demeter, the others gods often felt fit to decide her fate for her. Demeter enrolled her in helping with her Mysteries while Zeus took it upon himself to give her away. Hades, her husband to be, came up from the underworld and took her away. Demeter, saddened by the loss of her daughter and helper, wept and refused to continue bringing life to the earth. Cornered by a dying world, Zeus forced Hades and Persephone to part.\\n\\nBefore leaving the underworld Hades offered her a seed of a Pomegranate grown in the underworld. Persephone was clever. She understood what was being offered. Those who eat the food of the underworld are bound to it and must return. Hades was offering her a choice. A choice she was happy to accept. Every six months Persephone leaves the underworld, soothing Demeter’s grief and bringing life back to the world.\\n\\nThe time has now come for Persephone, Queen of the Underworld, to return and take her throne besides Hades. She has seen the gods struggle against themselves at the expense of those around them. She can no longer watch as droves of mortal souls arrive; their lives cut short while they struggled for each and every victory as the gods they pray to cause their suffering. Soon all gods will see why she is called ‘Clever Persephone’.","name":"Persephone","pantheon":"Greek","roles":["Mage"],"title":"Queen of the Underworld"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"persephone"},"buildId":"8aVNrGCo8ZxrNefqPFi1C","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
