od-cards/tyr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/tyr.jpg","lore":"Tyr. The embodiment of mankind’s impossible ideals. Man is a malleable creature, but a God is stone, shaped only by the harsh weather of expectation. And none have a greater burden of expectation than Tyr, for he is Courage. He is Honor. He is Justice.\\n\\nCourage is not the absence of fear, but the will to face the frightening.\\n\\nFenrir, the mighty wolf, was foretold to wreak such devastation on the Gods that they sought to bind him. Tyr, clothed in courage, brought the beast to their prison, where the Gods prepared shackles.\\n\\nHonor is not a stubborn oath, but the integrity to uphold what is right, even when it is not easy.\\n\\nUnder the guise of a test of strength, twice the Gods bound Fenrir, and twice he broke free. On the third attempt, Fenrir sensed a trick and demanded one of the Gods place their hand into his mouth. If the binding proved magical, Fenrir would take the hand. Tyr agreed.\\n\\nJustice is not adherence to the law, but a code of fairness and morality.\\n\\nBound by the mystical ribbon, Fenrir devoured Tyr’s hand. It was the price to be paid. And Tyr paid it willingly. Even Fenrir deserved justice.\\n\\nOne handed, Tyr is worshipped as a pinnacle of righteousness, called upon for valor in battle, balance in law, and the fortitude to face the impossible. As the cloud of war blackens the world, and fear grips the people, Tyr is stooped by the weight of expectation. With blade in hand, he takes the field. For he is Courage. He is Honor. He is Justice.","name":"Tyr","pantheon":"Norse","roles":["Warrior"],"title":"the Lawgiver"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"tyr"},"buildId":"8aVNrGCo8ZxrNefqPFi1C","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
