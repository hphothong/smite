h so that none could overthrow him as he had his own father. When Zeus was born, Rhea, Zeus’ mother, hid the child from Cronus and gave the Titan a rock in swaddling clothes, which he swallowed instead. In secret, Zeus grew up on the isle of Crete until he was old and strong enough to challenge his father. During their battle, Zeus slit open Cronus’ stomach, allowing his swallowed brothers and sisters to escape, slaying the Titan. Then, Zeus released the Cyclops and other beings Cronus had kept imprisoned. In gratitude, the Cyclops awarded Zeus control over lightning.\\n\\nWith his two brothers, Poseidon and Hades, the three Gods drew lots to decide command of creation. Poseidon became king of the sea, Hades the underworld, and Zeus the sky. From his golden throne atop Mount Olympus, Zeus now rules Gods and Men with his wife Hera, upholding justice, hospitality, oaths, and honesty to all under his domain.\\n\\nYet, Zeus is a restless God, and while he holds high expectations for others, he does not keep those standards for himself. Chiefly, Zeus is nearly infamous for several infidelities to his wife which have resulted in dozens of children beget by other women, most famous of which are Hercules, Artemis, and Athena. Such wanton unfaithfulness is the source of great jealousy from Hera, though as King, Zeus can ultimately do as he wishes.\\n\\nWeather is dictated by the Thunder God’s mood. When in a fair temperament, the sky is clear, bright and warm. When Zeus’ anger flares, black clouds roll in, lightning streaks the sky and thunder shakes the very ground. Lately, Zeus has been furious.","name":"Zeus","pantheon":"Greek","roles":["Mage"],"title":"God of the Sky"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Zeus"},"buildId":"Y-2VrX9-xfijCkzCPt1bq","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
