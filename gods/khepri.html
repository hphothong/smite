e/god-cards/khepri.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/khepri.jpg","lore":"At dawn, the sun lifts above the horizon, bathing mankind in color and life. At dusk, it sinks beneath the edge of the world, lost to sight, casting all into darkness. While the sun shines on the realm of mortal kind it is radiant Ra that guides it, but at night we share the sun with the underworld. It is not Ra that moves the sun along its subterranean path but Khepri, the scarab God, he who comes with the dawn.\\n\\nScarabs form dirt and dung into perfect spheres. Within, they lay eggs from which their young emerge fully formed. Using powerful arms and legs, scarabs can roll these spheres - many times their own size - incredible distances. It is from their father, Khepri, the sacred scarab gained this power. For the Dawn Bringer, the Sun is his sphere and all souls, living and dead, his children.\\n\\nKhepri is a guardian, a protector and a friend. He is a symbol of power and loyalty. Usually content to stay aloof, Khepri has risen for battle to defend existence from this shattering war. He will fight to shield us until the final sunset. Yet, it is he that brings the dawn.","name":"Khepri","pantheon":"Egyptian","roles":["Guardian"],"title":"The Dawn Bringer"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"khepri"},"buildId":"AJYMN08ml0vplKIMqLlwo","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
