rds/serqet.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/serqet.jpg","lore":"It is with fear and trepidation that man walks carefully near the serpent and scorpion. Not that these creatures could overpower him with strength or guile, but the fierce venom they carry is deadlier than any blade or arrow. Yet, for all the dread they induce, they never strike randomly or in anger. Poison of any kind is controlled and administered only to those deserving of such punishment. Serqet, Goddess of Venom sees to this.\\n\\nThough crushing strangulation and pain await those touched by her sting, Serqet is not a deity of retribution but guardianship. The wakeless dead are embalmed and preserved for all time in fluids taken from Serqet's beasts. Of the four sacred Canopic Jars which hold the internal organs of the mummified, Serqet is the watcher of one. And, though her strikes mean certain death, Serqet can cleanse poison as easily as apply it.\\n\\nA battlefield is a strange place to find this Goddess. Normally, Serqet is an invisible presence. She watches. She waits. She learns before she strikes and ensures that those she kills deserve such an end. It must be that the vanity of the Gods has pushed Serqet too far. Now all will meet death with venom in their veins.","name":"Serqet","pantheon":"Egyptian","roles":["Assassin"],"title":"Goddess of Venom"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"serqet"},"buildId":"v-ojWr6Np7ReSzrenonCa","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
