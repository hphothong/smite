od-cards/neith.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/neith.jpg","lore":"When time began, there was only endless black waters. Yet, from water comes all life, and from this primordial force was born the first of Goddesses, Neith.\\n\\nAs the waters continued to form the world and everything within it, Neith’s natural instinct to protect and nurture the people led her to champion the hunt. With meat she fed them and with hides she clothed them, but as the people she sought to protect grew old, or sick, or died on the battlefield, Neith’s compassion forced her to change her calling.\\n\\nWith nimble fingers, the Goddess wove shrouds to shield the lost spirits of the dead on their journey to the underworld, leaving a loose thread she could trace as the ghosts ventured down the river. As time passed, more and more threads spread across the world, weaving an intricate pattern of fate that only Neith could see.\\n\\nNow, the war between Gods grows ever more fevered, and Neith can no longer sit idle. The threads of fate are fraying at the edges and she must once again pick up her bow and hunt, or watch the world return to the waters from whence it came.","name":"Neith","pantheon":"Egyptian","roles":["Hunter"],"title":"Weaver of Fate"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Neith"},"buildId":"bJjVD2Qh0j71wFbpAHEfp","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
