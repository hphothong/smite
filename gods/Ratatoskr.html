om/smite/god-cards/ratatoskr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ratatoskr.jpg","lore":"Yggdrasil, the world tree; upon those mighty boughs are held the nine realms of existence, and nests the wise Eagle. Far below, across the galaxy spanning trunk, and beneath the roots, coils Nidhogg, the deplorable serpent. In eternal, bloodless conflict are the Eagle and Serpent locked. Perhaps these two enemies would have forgotten each other long ago were they not able to trade jabs and threats across that impossible distance. Yet, there is one that takes great pleasure enabling this feud, one whose mischievous talent for insults and barbs knows no bounds. And he’s just a squirrel.\\n\\nRatatoskr, the sly messenger, has lived in the World Tree since time immemorial. Where he came from or why is truly unknown, but if there’s a way for him to stir the pot between any two gods, he’ll do it. He’s a master of gossip and coy, backhanded compliments. And yet, all the Gods come to him for news. His home on the trunk of Yggdrasil conveniently places Ratatoskr at the center of all cosmic activity.\\n\\nAs Gods from every Pantheons clash, how could Ratatoskr pass up the opportunity to instigate new rivalries? Quite simply, he cannot. Beware the squirrel.","name":"Ratatoskr","pantheon":"Norse","roles":["Assassin"],"title":"The Sly Messenger"}},"__N_SSG":true},"page":"/gods/[name]","query":{"name":"Ratatoskr"},"buildId":"WaqeBF-qEUZr2_TxcLij0","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
