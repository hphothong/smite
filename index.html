spirits.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tanuki-trickery.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/uproarious-rocket.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dubious-savings.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/danzaburou.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/danzaburou.jpg","lore":"Among the tanuki of Sado Island, one name is known above all others – that of Danzaburou. The supreme commander of all tanuki is infamous for his antics and his tricks are justly feared by mortal and immortal alike.\\n\\nA shape-shifter and trickster without equal, Danzaburou has never met a prank he would not pull. While these are mostly for his own amusement, he has been known to act on behalf of others, so long as he finds it entertaining. Even so, like all tanuki, he lives to cause trouble, and relishes every opportunity to show off his cleverness, as well as his capacity to cause havoc.\\n\\nNowhere is this more evident than on the battlefield, where Danzaburou surrounds himself in chaos and confusion. He fights with great cunning. When not dodging his opponent’s attacks, or leaving a statue in his place to absorb the brunt of their wrath, he’s hiding in plain sight, waiting for his moment to strike. To say that Danzaburou is a frustrating opponent is an understatement.\\n\\nBut Danzaburou brings more than just frustration – he is also a purveyor of good fortune. Jug of sake in one hand, and a promissory note in the other, the tanuki offers his opponents a drink and payment even as he plans his next trick or three. With his sly grin and big belly, the cheerful tanuki can turn even the staunchest of his foes into a friend – at least for as long as it takes to get to the bottom of a jug of sake.\\n\\nIt is said that Danzaburou has been outwitted only once, by a human peasant. Ever since, the tanuki has refrained from playing tricks on hapless humans. Instead, he reserves his best pranks for what he considers to be a less perceptive audience...\\n\\nNamely, the gods themselves. ","name":"Danzaburou","pantheon":"Japanese","roles":["Hunter"],"title":"The Legendary Tanuki"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unruly-magic.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/strife.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/erratic-behavior.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/golden-apple-of-discord.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/contest-of-gods.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/discordia.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/discordia.jpg","lore":"It is said Rome wasn’t built in a day. Whether the sweeping arches of the Colosseum, the long stretch of the aqueducts, or the power the Servian Wall, none can truly claim they were the origin that “built” Rome. For as mighty as she has become, Rome might have never been were it not for the mischief of the Goddess Discordia.\\n\\nOnce known among the Greeks as Eris, the maligned Goddess of Strife, Discordia craved to unleash her full potential, to unravel the foundations of the mortals and deities that hated her. She found that opportunity through the vanity of others.\\n\\nConjuring a golden apple, Eris cast it forth. Upon it read the words ‘for the fairest.’ A phrase that would set Athena, Hera, and Aphrodite against one another. A phrase that would cause Paris to kidnap Menelaus’ wife, Helen. A phrase that would ignite the Trojan War.\\n\\nAs chaos swirled, as cities crumbled, as heroes both Greek and Trojan fell to each other’s blades and Gods grew to loathe one another, no one seemed to wonder from whence the golden apple came. It was masterful! Eventually, the Trojan War reached its peak, and Eris attached herself to the mortal Aeneus. She guided him safely from Troy, across the sea and wilderness, to the place where a new nation would be built. Here, Aeneus founded Rome.\\n\\nFree of the judgement she wore under the Greeks, bereft of the belittling glares of the other Gods, Eris was remade as Discordia. A Roman Goddess of importance and prominence. Indeed, Rome was not built in a day. It was the culmination of a plan for one Goddess to reinvent herself as more than she ever was.\\n\\nAnd all with one golden apple.","name":"Discordia","pantheon":"Roman","roles":["Mage"],"title":"Goddess of Strife"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spot-weakness.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pin.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/72-transformations.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/9-turns-blessing.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/howling-celestial-dog.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/erlang-shen.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/erlang-shen.jpg","lore":"Many are the legendary tales of Erlang Shen.\\n\\nHearing the riverlands surrounding his home were consumed by floods, he went to engineer new dams and canals. Yet the true  source of the disaster proved to be an evil dragon. With seven companions, Erlang Shen ambushed the beast. Cowardly and quick the dragon slithered into the rapid river waters, but Erlang Shen captured it with a great chain and bound it beneath a shrine. Thus the floods subsided.\\n\\nWhen Sun Wukong’s troublesome antics drew the ire of the Jade Emperor, Erlang Shen faced the Monkey King on the battlefield. For every form Sun Wukong took, Erlang Shen transformed as well. Across sea and sky and land they battled. Thus was Sun Wukong sent fleeing for his life.\\n\\nWhen the people were plagued by demons and monsters, Erlang Shen slaughtered them to keep his countrymen safe. Three-bladed spear in hand and hunting dog at his side, no evil could threaten the innocent or the Empire. Thus, Erlang came to be loved and worshipped.\\n\\nA Goddess mother and a mere mortal father, he is of two worlds. He is both sage and a soldier, humble yet regal, his veins filled with the blood of men and the divine blood of his uncle, the Jade Emperor. Having risen above his forbidden origins, Erlang Shen has proven himself among the greatest of heroes in the Jade Empire. Perhaps that is why he now takes the field. No demon, nor dragon, nor even the Monkey King himself has stood against him and won. To save the people, to save the world, Erlang Shen will fight, and another legend will be born!","name":"Erlang Shen","pantheon":"Chinese","roles":["Warrior"],"title":"The Illustrious Sage"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wing-gust.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spirit-ball.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dispel-magic.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/circle-of-protection.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/funeral-rites.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/eset.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/eset.jpg","lore":"When Eset was born, she was a Goddess. When she was married, she became a Queen. But a legendary journey to resurrect her murdered husband would make her a savior.\\n\\nFrom the God of Earth and Goddess of Sky, Eset was born, and she was a Goddess in her own right, loved by wealthy and poor alike, champion to sinners and slaves, artisans and aristocrats. She commanded the force of magic, for she knew the True Names of many things. For in the True Names lie true power.\\n\\nEset and her husband Osiris ruled Egypt, symbols of order and justice, and led their kingdom to true prosperity. But Osiris had a brother, Set, who harbored jealousy and malice, and sought to usurp his throne. For him, murder alone was not enough. Set hacked Osiris to pieces and cast them across Egypt.\\n\\nFleeing Set’s wrath, Eset traveled the land in secret, gathering the remains of her husband. Meanwhile, Set’s rule plunged the land into chaos incarnate, and all seemed truly lost. Unable to locate a final piece, Eset could wait no longer and summoned the potent powers of her magic to reassemble her husband and give him new life. That night, their love became a child, Horus, who would avenge his father and cast evil Set out of Egypt.\\n\\nHer bravery, tenacity, her skill and love drove Eset to save Egypt and become the mother of all Pharaohs. Long has she prayed that chaos would never again rise to threaten the rule of order and prosperity, but peaceful days are at an end. This time, it may not be her husband torn asunder, but all the world, and even the Goddess of Magic may not have the power to reassemble it from oblivion.","name":"Eset","pantheon":"Egyptian","roles":["Mage"],"title":"Goddess of Magic"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cursed-strength.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/coerce.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/underhanded-tactics.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/draconic-corruption.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/endless-greed.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/fafnir.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/fafnir.jpg","lore":"There is no creature, living nor dead, more greedy, more vile than a dwarf. In the frozen reaches of Asgard, beneath her mighty stone peaks, do they dwell, ever hammering to forge more gold jewelry, to carve more gleaming gems, to breathe curses into their finery.\\n\\nAmong these wretched kin is Fafnir, son of Hreidmar, with a swollen smithing arm and a ravenous hunger for violence, both of which are eclipsed by his avarice.\\n\\nOne Spring, Odin, Loki, and Honir visited Hreidmar’s realm, bearing an otter pelt they’d skinned on their journey. Horrified, Hreidmar entombed the Aesir, for the otter was, in truth, his third son. Freedom would not be theirs until Loki returned with the hide filled with gold.  Refusing to be outdone, the Trickster God, stuffed the pelt to bursting with the cursed treasure of Andvarri. Hreidmar, unaware of the maligned hoard, greedily exchanged the Aesir for the wealth. That night, curling his powerful arm, Fafnir strangled his father and vanished into the frosted night with the cursed gold.\\n\\nAnd so it was that madness took him. Paranoid his last brother would steal the treasure, Fafnir guarded it jealously while the curse whispered in his ear. Slowly, surely, twisted he became, scaled and nightmarish. His breath turned to poison, his maw, fanged, his demeanor, fouler. A dragon, he became. The very symbol of greed.\\n\\nFor centuries Fafnir kept no company, but the War of the Gods grows ever closer, and the clink of coin runs rampant; a bulging sack on the belt of every warrior. He craves every piece, and spares no thought to shed blood for the glittering gold.","name":"Fafnir","pantheon":"Norse","roles":["Guardian"],"title":"The Lord of Glittering Gold"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unchained.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/seething-howl.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/brutalize.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ragnarok.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unbound-runes.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/fenrir.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/fenrir.jpg","lore":"Mortals must rely on the wisdom of the Gods, but never forget they are fallible. They can be petty, churlish, and worst of all, wrong. What are the consequences for their mistakes? They should have slain the wolf-beast Fenrir, but they chose instead to bind him. Despite the warnings and prophecies he would tear Odin apart at Ragnorok and devour the earth and sky, they did not end Loki's son. Now, terror roams free. It is unknown how, but Fenrir is Unbound.\\n\\nThrice they tried to bind him, each time convincing Fenrir that the chains were nothing more than a challenge for his strength, a test to see if he could shatter them. The first two God-forged fetters were easily broken beneath the beast’s terrible power, but the third was a ribbon, dwarf made, and Fenrir grew suspicious of the God’s intentions. As a show of faith, he demanded one of them place a hand in his mouth, and if the ribbon proved magical in nature, he would exact punishment. Brave, if foolish, Tyr put his fist in Fenrir’s maw as the ribbon was secured to the wolf’s leg. Fenrir strained and screamed, but could not break free, and in rage, he devoured Tyr’s hand.\\n\\nFor a time, Fenrir was forgotten, the dire prophecy just a memory. But they were all warned and the Gods did nothing. Fenrir is hungry now, the first hunter, an alpha among sheep, but no flesh will satisfy his need. It is revenge he craves, and now he is Unbound.","name":"Fenrir","pantheon":"Norse","roles":["Assassin"],"title":"the Unbound"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/irradiate.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pulse.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/banish.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/valkyries-discretion.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/brisingamens-blessing.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/freya.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/freya.jpg","lore":"Valkyries, the elite and angelic warriors of the Nordic Pantheon, are as beautiful and dangerous as a midnight winter storm. Yet their queen, Freya, so irresistibly desirable, so uncompromising in warfare, make the Valkyries seem nothing more than plain paper dolls. She’s the object of desire for every God, every man, and the envy of every woman. Even the Frost Giants crave her for their own, often devising devious plans to trick or force her into marriage. But Freya is proud and strong, with the cunning to escape her enemies and ruthlessly retaliate. Every rose bears thorns, but this one wields swords.\\n\\nWere it up to her, Freya would have little to do with blood and blades. Her name literally means “the lady,” and none of more worthy of the title. She adores bright flowers, pleasant company, and the sweet lilt of a sad love song. She’s sensual and amorous, invoked by worshipers seeking to bear a child or find a lover. Ruler of the realm of Sessrumnir, a place much like Valhalla, where the souls of dead warriors spend eternity, Freya provides comfort and bliss to the fallen.\\n\\nOnce, Freya was married to the mysterious and elusive God, Od. Immediately following their wedding, Od went on a journey to distant and inhospitable lands. So long was he gone the Gods presumed him dead. Distraught and heartbroken, Freya spilled tears of gold and searched the globe for him. Finally, she discovered him ship-wrecked and twisted into a hideous sea monster. Melancholy but loyal, she stayed and comforted him. Though one night, while she slept, a daring hunter slew the beast Od had become. Moved by Freya’s utter despair, the Gods agreed to allow Od into Sussrumnir, despite the fact he had not died in battle, so he and Freya could remain together forever.","name":"Freya","pantheon":"Norse","roles":["Mage"],"title":"Queen of the Valkyries"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/turn-of-fate.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ohm.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/remove-obstacles.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dharmic-pillars.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/good-fortune.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ganesha.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ganesha.jpg","lore":"After rigorous celebration, Parvati, Goddess of fertility and love, washed the dirt and sweat from her body. It floated upon the surface of her pool, formless and purposeless. With a wave of her hand, it was transformed into a boy, her son, and set him to guard the door as she finished washing. Shiva, the supreme being, returned and found this child doggedly blocking his path. Fearing the safety of his wife, Shiva drew his sword and cut him down.\\n\\n“This is your son!” Parvati cried. “You must save him!”\\n\\nHurriedly, Shiva replaced the head of the child with the wisest creature in the world, that of an elephant. Thus, was Ganesha truly born.\\n\\nGenerous, warm-hearted, and optimistic, Ganesha has assumed authority over the very thing his mother tasked of him - obstacles. For those whose hearts are filled with boastful arrogance, Ganesha challenges progress. Financial difficulties, faulty materials, and unhappiness plague their every action. But, for the honest, the hard working, Ganesha clears the way. A life of good fortune, bright skies, and joyous laughter. \\n\\nObstacles can be either placed or removed. So, to Ganesha all mortals pray when starting a new endeavor, that their path will be open and their future bright. That he may grant them success.\\n\\nOnly with reluctance has Ganesha joined the Battle of the Gods. Violence is the last obstacle the elephant-God would ever place. But these are not mortals that threaten existence. They are Gods, and it is time that Ganesha determined who should succeed, and who should fail.","name":"Ganesha","pantheon":"Hindu","roles":["Guardian"],"title":"God of Success"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/roll-out.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shock-wave.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stone-shield.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cataclysm.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hard-as-rock.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/geb.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/geb.jpg","lore":"Behold the rumble from the deep, for it is the bellow of rock and stone. A titan of immortal ages has awoken from fitful slumber to crush all who tread upon his realm. A lumbering giant, patient, deliberate, unmovable; he is Geb, God of Earth.\\n\\nWhen a mortal’s heart is weighed in the halls of Ma’at, Geb sits among the Gods in judgment. Those burdened with guilt and regret are claimed by Geb and dragged through the earthen crust to the underworld. Hearts free of such heaviness are taught words of power and ascend to the sky.\\n\\nAh, the sky.\\n\\nIt is but the one thing Geb longs for. In his eye, she is glorious sapphire, an unreachable object. But it was not always so. Once, the earth and sky were as one, Geb and Nut, Goddess of the Sky, locked in a lover’s embrace. Ra deemed their union unfit and sent Shu, God of Wind, between them. In his rage, Geb thundered and broke the earth, but for naught, Nut was now forever out of reach.\\n\\nThough his desire has not weathered with the ages, Geb has rested peacefully for time immemorial, nurturing Mankind through bountiful harvest and stable ground for pyramids and palaces. It is the clash of Gods upon his surface that stirs him. He has risen to war, though his motives are unclear. Does he fight to prevent the destruction of his realm, or will he seize the chance to shatter the wind and reunite the earth and sky? Whatever the outcome, the earth will always remain.","name":"Geb","pantheon":"Egyptian","roles":["Guardian"],"title":"God of Earth"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sun-forged-scimitar.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/drop-kick.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heros-advance.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/winds-of-shamash.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/epic-of-gilgamesh.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/gilgamesh.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/gilgamesh.jpg","lore":"The deeds of King Gilgamesh are many. Some good, some bad. Some true, some false. Stories of his heroism – and his arrogance – are told throughout Mesopotamia. He has slain monsters and toppled kings; breached the gates of the netherworld and relieved the sorrows of the gods. Or so the tales claim.\\n\\nWhat is known is this – two thirds divine and one third mortal, it has ever been Gilgamesh’s desire to be a true god, and that desire has often led him down the wrong path. Though adventurous and brave, he was also a tyrant, imposing his will on his subordinates, until the gods sent the wild man, Enkidu, to teach Gilgamesh the error of his ways.\\n\\nHowever, after a fierce battle, the two demigods became friends. Together, they freed the Cedar Forest from the monstrous Humbaba and slew the Bull of Heaven. They fought monsters and tyrants, and with every victory, Gilgamesh’s renown spread until finally, even the gods took note.\\n\\nBut his deeds, though mighty, were not enough to blind the gods to his overweening pride. Though his friendship with Enkidu had tempered his cruelty, his arrogance was undimmed.\\n\\nAs a consequence, the gods slew Enkidu and Gilgamesh was left alone once more. But with his friend’s death came a new purpose. And so, Gilgamesh set off on his greatest quest – the quest for immortality. He travelled to far lands, and vanished from the sight and knowledge of men.\\n\\nUntil now. Tiamat, the ancient foe of the gods, has returned, and Gilgamesh has returned with her. For if he can unite the pantheons of the world against the dragon queen and defeat her, perhaps the gods will give him what he seeks at last. ","name":"Gilgamesh","pantheon":"Babylonian","roles":["Warrior"],"title":"King Of Uruk"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/conviction.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/warriors-will.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/taolu-assault.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cavalry-charge.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/painless.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/guan-yu.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/guan-yu.jpg","lore":"As a man, Guan Yu was the embodiment of loyalty, honor, and strength. As a God, he is a guardian of justice, a hero to the downtrodden, the Saint of War.\\n\\nIn the ancient times of the East, a great war between Three Kingdoms raged. The warlord Liu Bei, and his friends, Zheng Fei, and the mighty Guan Yu swore an oath of brotherhood in a mystical peach garden, vowing to create a new, righteous world. Together, they fought countless battles against the warlords Cao Cao and Sun Quan, and Guan Yu grew famous for his combat prowess and unwavering honor.\\n\\nDuring the war, Cao Cao captured Guan Yu. At the time, Liu Bei’s fate was uncertain, so he agreed to fight for Cao Cao under specific terms, chiefly that he would abandon Cao Cao if ever he learned the whereabouts of his sworn brother. Despite Cao Cao’s gifts and promises of wealth, when Liu Bei resurfaced, Guan Yu immediately went to his side. Years later, Guan Yu again faced Cao Cao on the battlefield as the warlord fled from his defeat at Red Cliffs. Guan Yu cut off Cao Cao’s retreat and obliterated his forces. Cao Cao, however, he spared and released, as a matter of honor.\\n\\nAfter his death, Guan Yu’s spirit remained at a holy shrine, coming to the aid of nearby villagers in need, battling the cruel and selfish. From all over the East, worshippers came to the shrine and burned incense to honor him. Such popularity led to Faith, and thus Guan Yu was raised as a God, deified a few hundred years later.\\n\\nNow, he embodies the virtues he lived by. His statues, wielding a massive guan dao, ward against evil. Red faced to represent loyalty, his likeness is carried by merchants as proof they can be trusted. If their cause is just, he leads armies to victory. Among the Gods of any Pantheon, there are few as deadly and none as righteous as Guan Yu.","name":"Guan Yu","pantheon":"Chinese","roles":["Warrior"],"title":"Saint of War"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eagle-eye.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heavenly-banner.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/iaijutsu.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mounted-archery.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/master-of-arms.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hachiman.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hachiman.jpg","lore":"War. It is an inevitable truth of Gods and Men. Harbinger of death and misery, of orphans and widows, of safety. It can be brutal and bloody, lacking all mercy, stripping away humanity, leaving only violent souls. Some believe war is about more than victory, some believe it is how that victory is won. That a warrior can be honorable, can treat his enemies with respect, that he can retain his humanity. When there is war to be fought, this is the kind of warrior Hachiman teaches.\\n\\nPregnant with her unborn son, Hachiman, the Empress Jingu led a fierce campaign against the forces that slew her husband. Fearing her child’s birth would slow the army’s advance, she tied bandages about her belly and held him within for 3 years, until the war was done. Each day, she prayed she would not lose the child, that he would be born strong. That he would be a God. As 8 banners descended from heaven, heralding his birth, her prayers were answered.\\n\\nHachiman embodies all a warrior should be. Temperate but fearless. Deadly not ruthless. Respectful, to enemies and allies alike. He understands that war cannot be stopped, so he teaches how war should be.\\n\\nEven in this, a war between Gods, Hachiman will retain his code. It is the humanity of the Gods that appeals to mortals, that makes them love and worship him. Should Hachiman lose even that, then he is no warrior. He is only war.","name":"Hachiman","pantheon":"Japanese","roles":["Hunter"],"title":"Lord of the Eight Banners"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/death-from-below.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shroud-of-darkness.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/devour-souls.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pillar-of-agony.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/blight.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hades.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hades.jpg","lore":"Inevitably, death sends everyone to Hades, God of the Underworld. In the end, he always gets his way.\\n\\nEldest son of the Titans Cronus and Rhea, Hades was swallowed by his father as an infant along with five other siblings. Zeus, the youngest brother, escaped this fate and freed them once he’d grown strong enough to battle Cronus. Together, the six siblings defeated the Titans and banished them to the dark realm of Tartarus. Now the reigning Gods, Zeus, Poseidon, and Hades drew lots for dominion. Hades drew the Underworld.\\n\\nOf the few that have entered the Underworld and come back, all speak dismally of the place, never wishing to return. Yet Hades, himself, rarely leaves the subterranean realm, constantly seeking ways to grow the numbers of the dead.\\n\\nWhen he desired a wife, Hades captured the radiant Persephone, daughter of the Goddess Demeter. Concealed in the Underworld, none could reach her, so Demeter cursed the land with a great famine. The other Gods pleaded with her to end it lest she destroy mankind, but she would not relent until her daughter was returned. Hades finally let Persephone leave, though not before feeding her pomegranate seeds. Having consumed the fruit, she was bound forever to Hades and required to return to her husband once per year to eat of the seeds again. This, it is said, is a time of mourning and the cause of winter.\\n\\nWhile many fear death and view it as evil, in truth, Hades endeavors only to keep balance. He is stern but fair. As God of the Dead and the Underworld, he views his authority on this matter absolute, forbidding anyone to leave his realm and growing wrathful when disobeyed or when someone tries to cheat death or steal from him.\\n\\nFor everyone, death is unavoidable and service to Hades inevitable. Even the Gods.","name":"Hades","pantheon":"Greek","roles":["Mage"],"title":"King of the Underworld"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/water-cannon.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/atlas-of-the-yellow-river.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/waterspout.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/crushing-wave.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/steady-flow.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/he-bo.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/he-bo.jpg","lore":"As God of the Yellow River, He-Bo tamed the massive and turbulent waters with humility and sacrifice. Now, the forces of the great river are at his command!\\n\\nThroughout history, no river has been the source of more nourishment or more destruction than China’s Yellow River. Its basin valley was the cradle that birthed Chinese civilization, feeding fields with water and millions of tons of collected sediments, which give the river its yellow hue. The river is also treacherous and prone to flooding, destroying shoreline settlements and drowning thousands.\\n\\nLong ago, Feng Yi, a mortal man living along the riverside, watched in dismay as a storm stirred the waters and gorged the banks. It would not be long before the mighty river consumed his village. Both humble and wise, Feng Yi tied rocks to his belt before casting himself into the waters. This act of sacrifice did more than appease the angry river, it promoted Feng Yi to Godhood over it. Thus, he became He Bo.\\n\\nMuch time passed, and He Bo grew proud of his great river, so proud that he declared the Yellow River the biggest body of water anywhere. A passerby asked if He Bo had seen the North Sea, but He Bo dismissed the comment, for heavy rains were falling and the river was roaring and full. As time wore on, thought of the North Sea tickled his mind, so he made the journey. There, the Dragon King of the Northern Sea warmly met him.  Viewing the endless expanse of water, He Bo was humbled and returned to his River wiser.\\n\\nFor He Bo, there are no greater virtues than wisdom and humility. With the force of the Yellow River at his command, He Bo will remind his enemies what it means to be humble.","name":"He Bo","pantheon":"Chinese","roles":["Mage"],"title":"God of the Yellow River"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/piercing-sight.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/gjallarhorn.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-bifrost.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/through-the-realms.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-vigilant.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/heimdallr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/heimdallr.jpg","lore":"All paths have their guardians. And no guardian is more steadfast in their duties than keen-eyed Heimdallr, sentinel of the Bifrost. The watchman of Asgard is a sentry without equal in the Nine Realms and he maintains his eternal watch where the rainbow bridge meets the sky. With sharp eyes and keen hearing, Heimdallr stands guard over the halls of the gods, alert for the approach of any enemy as well as the first stirrings of Ragnarok.\\n\\nIt is said that Heimdallr requires less sleep than a bird, and can see for hundreds of leagues. His hearing is so sharp that he can perceive the soft whisper of growing grass, and the murmur of the dead. His trumpet, Gjallarhorn, can be heard across the Nine Worlds when blown. But it is not only his senses which make Heimdallr a superb sentinel.\\n\\nHe also possesses the gift of foresight, allowing him to predict his opponent’s moves before they occur and to sense the approach of inimical forces. As befitting one of the Aesir, he is a masterful combatant, and his foreknowledge gives him an edge over all but the most unpredictable – or skilled – of opponents.\\n\\nToo, it is whispered that Heimdallr has some connection to Yggdrasil, the World Tree. Some insist he was fashioned whole from a splinter of the great ash tree, while others believe he is bound to it in some fashion, much like Ratatoskr. Whatever the case, it is known that Heimdallr takes a dim view of any who might threaten Yggdrasil.\\n\\nThus, when his keen gaze settled upon the creeping tendrils of Persephone’s minions, drawing ever closer to the World Tree, Heimdallr moved instantly to confront them. Powerful as she was, even the Queen of the Underworld could not hide her intentions from the watchman of Asgard… ","name":"Heimdallr","pantheon":"Norse","roles":["Hunter"],"title":"The Vigilant"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/decay.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hinder.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/repulse.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/switch-stances.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stance-attunement.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hel.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hel.jpg","lore":"Both beautiful and terrible, the Goddess Hel is keeper of the dead, lays judgment on souls, and decides who is reborn. She is both sides of two extremes.\\n\\nAs the daughter of Loki, the trickster God, Hel’s destiny, much like her brothers Fenrir and Jormungandr, was doomed to darkness from the start. Odin, the All-Father, uncovered prophecies that Hel and her siblings would be the source of great calamity resulting in Ragnarök, the battle that would end all things. In an effort to prevent this, he cast each of the three into different realms; not quite a prison, though far from freedom. For Hel, Odin gave her charge of the realm of the dead, specifically those that died of sickness and old age. For himself, Odin retained Valhalla for those that died in battle.\\n\\nAt birth, Hel’s face was cast half in shadow, half in light; she was both living and dead, so took immediately and graciously to her new role, gifting Odin with the ravens Huginn and Muninn in appreciation. As the spirits of the kind-hearted, the sick, the elderly were brought to her, she cared for them, gave them comfort, yet those she deemed evil she mercilessly hurled into the frozen depths of Niflheim.\\n\\nYet, despite Odin’s efforts, destiny cannot be averted. Hel’s conflicting struggle between benevolence and malice will force her to one extreme or the other. A time will come when Hel will fulfill her prophecy, though it is yet unknown if she will be a shadow of darkness or a force of light.","name":"Hel","pantheon":"Norse","roles":["Mage"],"title":"Goddess of the Underworld"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/royal-assault.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/polymorph.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divine-shroud.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/argus-the-defender.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/commanding-presence.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hera.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hera.jpg","lore":"From the summit of Mount Olympus she has watched the gods and pantheons. Their triumphs, their follies. She watched as the legends of Zeus, of Hercules, and all the others were etched into history. The world has descended into calamity, and she can watch no longer. Now, the time has come for the legend of Hera to be written.\\n\\nBy her side stands Argus, her champion, the indomitable agent of her will…and vengeance. Through her charisma and skill Hera has rallied great heroes and whole armies to follow her, yet she is no distant general. Hera is Queen of the Gods, born of the Titans, and any who cross her shall know her justice first hand.\\n\\nWhile the other gods are masters of lightning, or fire or death, Hera is master of divinity itself. She can reshape nature, including her foes, and she will hold nothing back as she steps forth upon the Battleground of the Gods.\\n\\nFor the Queen of the Gods has come at last, and she has come to rule.","name":"Hera","pantheon":"Greek","roles":["Mage"],"title":"Queen of the Gods"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/driving-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/earthbreaker.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mitigate-wounds.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/excavate.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/strength-from-pain.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hercules.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hercules.jpg","lore":"Brave Hercules, a demigod son of Jupiter, born with impossible strength and force of will; for whom no task is insurmountable, no heroic deed unachievable. Yet, Like all of Jupiter’s illegitimate children, Hercules once drew the ire of Juno, and though he is now known as a hero, his greatest achievements might never have been done without Juno’s initial tragic involvement.\\n\\nShe struck Hercules mad, and he slew his own children.\\n\\nOnce recovered, grief stricken, Hercules sought penance for his crimes. An oracle of Jupiter advised he should pledge his service to the king Eurystheus, and so Hercules reluctantly did so. Jealous of the demigod, the king set him to twelve impossible tasks, expecting him to fail at the first, to slay the Nemean Lion and return with its hide.\\n\\nThe Nemean Lion captured women and devoured soldiers. Its fur was so thick no weapon could pierce it, and its claws so sharp, no armor could guard against them. Hercules tracked the lion to its mountain caves and drew it out, firing arrows that shattered against the beast’s impenetrable coat. Agilely, he dodged as the lion leapt to maul him. In the end, Hercules aimed a powerful shot straight into the lion’s roaring maw, a place the powerful fur did not protect, and slew it. Then, using the beasts own claws, he skinned the hide, wearing the mantle proudly as his new armor.\\n\\nEurystheus was aghast upon the hero’s return. Immediately the legend of Hercules began to grow. Eleven more labours the confounded king set against him, but time after time, year after year, Hercules performed what could not be done, earning fame, glory, and the peace he so desperately sought.","name":"Hercules","pantheon":"Roman","roles":["Warrior"],"title":"Champion of Rome"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/updraft.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fracture.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/protectors-surge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/to-the-skies.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/resolute.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/horus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/horus.jpg","lore":"Heavy lies the head that wears the crown. If such an adage holds true, then surely the heads that seek to wear it must as well. Born of Osiris, and destined to ascend to the throne of the Egyptian Pantheon as its divine ruler, Horus is an entity of great power, whose formidable strength is mirrored by his innate desire for balance and justice.\\n\\nAnd yet, these grand attributes are not what has come to define Horus amongst the divine beings who walk the earth. Rather, it is strife, division and conflict that cling to him like a shadow. A shadow that has taken the form of his uncle, Set.\\n\\nSet stands in opposition to Horus’ ascension to rule, challenging so that he might be the one to take the throne and hold the destiny of their pantheon, lands and mortal worshippers in the palm of his hand. Thus has begun a path of chaos and destruction that has claimed countless lives, including that of venerable Osiris himself. Reeling from the cold-blooded murder of his father by his own uncle, Horus swore an oath to all creation, on pain of his own death, to set right the horrific deeds that had been perpetrated, and restore order, peace and justice to the land.\\n\\nFor Horus, this conflict will see his kingdom restored to its full former glory, first among equals of all the Pantheons in creation, or should he fail, see all he knows and loves cast into darkness, corruption and ruin. He has become inextricably linked with Set, a shining reflection of his uncle’s brooding darkness. Horus knows in his heart that Set will stop at nothing to achieve his aims, and so he must do the same. For the fate of all, he must prevail, no matter the cost. ","name":"Horus","pantheon":"Egyptian","roles":["Warrior"],"title":"The Rightful Heir"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ricochet.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mark-of-the-golden-crow.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divebomb.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sunbreaker.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/suntouched.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hou-yi.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hou-yi.jpg","lore":"In a time long past, an unexpected calamity came to be. From whence none knew, ten suns rose above the horizon. Such incessant light and heat ravaged the earth, wilting fields of grain, drying rivers, even melting forged metal. Bent beneath the scorching rays, the people begged the Emperor-God Di Jun to aid them. In reply, he called the great archer, Hou Yi.\\n\\nArmed with a mystical red bow and a quiver of white arrows, Hou Yi traveled to Earth. What he found was a barren land. Shielding his eyes, he peered to the sky where the ten suns cruelly flared.\\n\\nNocking arrow to bow, Hou Yi loosed a warning at the suns hoping to frighten them away, but they impassively remained. So Hou Yi drew again and fired a killing shot. Pierced, the sun exploded in color and a giant red raven with three legs fell to the earth, slain by the white arrow.\\n\\nEight times more Hou Yi drew arrow to cheek. Eight shots more he let fly. Eight more bursts rent the sky, and eight more ravens fell dead. But one sun he left, and so fearful of Hou Yi's archery, this sun behaved, dipping below the horizon.\\n\\nNow armed with the power of the red ravens he smote, sending light and fire against those that threaten the world, be it monster or beast, dragon or sun, man or God, Hou Yi is the Defender of the Earth.","name":"Hou Yi","pantheon":"Chinese","roles":["Hunter"],"title":"Defender of the Earth"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/somersault.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overhand-smash.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sacred-monkey.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fear-no-evil.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/infused-strikes.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/hun-batz.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/hun-batz.jpg","lore":"A grudge, like any wound, left untended will fester.\\n\\nHun Batz and his twin brother Hun Chouen, led a contented life with their grandmother. Artists and musicians, everything they created was beautiful and enchanting, but they lacked their father’s talent for the ball game, Pitz. Summoned to the underworld, their father, Hun Hunapu never returned. Instead his new offspring, half-brothers to Hun Batz and Hun Chauen, appeared. The Hero Twins were everything the original twins were not, strong, athletic, and clever. And they were extremely gifted at playing Pitz.\\n\\nA jealous rivalry formed between the two sets of twins. The more they played ball together, the more Hun Batz and his brother were defeated. Eventually, the original twins resorted to foul tricks, aggressive tactics, and out-right cheating. Frustrated with these antics, the Hero Twins kicked the ball into a tree, knowing Hun Batz and his brother considered themselves excellent climbers and would go after it. Yet, the higher they climbed, the taller the tree grew, until they could not get back down. Pleased with their magic thus far, The Hero Twins encouraged Hun Batz and Hun Chouen to use their belts like tails in order to escape the terrible height. However, upon doing so, they were mysteriously and humiliatingly transformed into monkeys.\\n\\nThough the Monkey Twins, as they are now called, came to be worshipped as Gods of Art and Music, the animosity they hold for the Hero Twins remains. Time has only sharpened their combined cunning, and they eagerly await a chance to strike back. Like any wound, their grudge has festered, and what was once a brotherly rivalry has grown into a far more deadly game.","name":"Hun Batz","pantheon":"Maya","roles":["Assassin"],"title":"the Howler Monkey God"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sickle-storm.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spectral-projection.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fade-away.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dark-portal.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/death-draws-nigh.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/izanami.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/izanami.jpg","lore":"As Izanami gave birth to the god of Fire, his searing skin scorched her flesh. Fearful she would die, her husband, Izanagi, the man with whom she had created the world, held her close and wept. But it was too late. So grievous were the wounds, Izanami succumbed to death.\\n\\nTo rescue her soul, Izanagi traveled to Yomi, the realm of darkness and death. Through the black maze he searched, until finally he came upon her, hidden amongst the shadows. He implored her to return with him. She could not, for she had already eaten the fruit that grew in Yomi. Izanagi insisted. He would not leave her in this place. He swore it.\\n\\nIzanami agreed to take her husband to see the Gods of Yomi, to implore them to free her. Meanwhile, remain in darkness, she cautioned him, for the realm of the dead was not meant for the living to see. Taken by foreboding, Izanagi lit a torch and laid eyes upon his wife. No longer the graceful, elegant beauty she once was, Izanami now appeared a rotting corpse, hollow and decayed, maggot ridden and foul. Frightened and disgusted, Izanagi broke his vow and fled.\\n\\nThrough the bowels of Yomi he ran, pursued by the fiend that was once his wife. Escaping the cave entrance, Izanagi rolled a boulder in place to block it. Sealed within, betrayed and cursed, consumed with wrathful anger, Izanami swore, one thousand lives would she take each day. One thousand to pay for the broken promise he made.\\n\\nSince then, Izanami has kept her vow, each day reaching beyond the grave to pull souls to Yomi. But war has broken the boulder that once kept her sealed away, and Izanami has emerged, cold and lifeless, but burning with a vengeance against all that lives. One thousand souls will not be enough.","name":"Izanami","pantheon":"Japanese","roles":["Hunter"],"title":"Matron of the Dead"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/portal.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unstable-vortex.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/threshold.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/through-space-and-time.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/passages.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/janus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/janus.jpg","lore":"Many fear change. Venturing into the unknown. Deviating from a path of safety and certainty into something unexpected. But life is change; a journey through doorways both physical and emotional, with every moment a passage to something new, and it is Janus, God of Portals and Transitions that governs this.\\n\\nBearing two faces, Janus is ever looking to the future and to the past, knowing both but controlling neither. He is only the in-between, found in the changing of seasons, at the birth of a child, at the entrances to the temple and the tavern. For this reason the Romans named the first month after him: January – a portal between the old year and the new.\\n\\nYet the Roman emperors also attribute a strange tradition to Janus. At each end of his temple stand massive doors. In times of peace, these doors are closed, but in times of war, flung open. As Rome rose to power, rarely were these doors shut, but almost four hundred years of peace have clothed Rome since then and the temple has grown dusty with absence. These days, however, the doors are open once more. It seems war has returned, and the greatest of changes are upon us.","name":"Janus","pantheon":"Roman","roles":["Mage"],"title":"God of Portals and Transitions"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/persistent-gust.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/explosive-bolts.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/agility.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/air-strike.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rapid-reincarnation.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/jing-wei.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/jing-wei.jpg","lore":"Against the red rising sun, a winged form sweeps out to sea, claw clutched around a pebble. With focused grit, she hurls the small stone into the watery maw, circling above as it sinks into darkness. Resolved, she turns back to collect another. Jing Wei will not cease until the ocean is filled. That is her oath. And she will not break an oath.\\n\\nOnce, she was a young girl, a princess, enamored by the glory of morning light. She gazed in wonder as her father, Yan Di, the Flame Emperor, shepherded the sun from the eastern sea. Desperately, she longed to reach the place where it emerged, but her father refused take her on the waters.\\n\\nOne night, the princess sailed out alone, secretly hoping for a clear view come the dawn. But the waters were churning in a storm. Mountainous waves crashed into her tiny ship. The sea swallowed her whole.\\n\\nYan Di woke and coaxed the sun from the horizon, only to find the shattered remains of his daughter’s boat upon the shore.\\n\\nYet, even as he grieved, a bright goddess burst from the ocean and soared overhead. “Jingwei!” she cried, and Yan Di knew his daughter was reborn.\\n\\nThough given a second chance that day, Jing Wei swore an oath against the seas that took her life. She would fill them with stone until they were gone. An impossible task. But Jing Wei swore an oath. And Jing Wei will not break an oath.","name":"Jing Wei","pantheon":"Chinese","roles":["Hunter"],"title":"The Oathkeeper"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/venomous-haze.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/consuming-bellow.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/submerge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-world-serpent.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/immovable.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/jormungandr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/jormungandr.jpg","lore":"Armageddon. Apocalypse. The end times. All myths and legends contain forewarnings of a great, singular catastrophe, when the stars fall from the sky and the very earth breaks apart into nothingness. Among these days of judgement, none are eclipsed in their scale of horror and destruction foretold of more than Ragnarok, the prophesied disaster of the Norse pantheon.\\n\\nThere is a single being who acts as the herald of Ragnarok, the god known as Jormungandr, the World Serpent. A son of Loki, he is an immense, serpentine dragon, massive enough to encircle the entire world and blot the light from the sun. Dark omens are whispered of when the World Serpent will rise, casting his noxious poisons out to engulf the whole of the earth.\\n\\nThe time Jormungandr bestrides the earth is one of unmatched calamity, the days of Ragnarok where the oceans boil and the land quakes. They are days of incredible violence, where both mortal and divine blood shall soak the ground, and the World Serpent will mete out destruction with a fanatic’s zeal. He will swim through the earth and seas alike with vast snapping jaws and caustic venom, sweeping away any opponent brave enough to stand against him.\\n\\nOne such champion is Thor, the mighty God of Thunder. Long has his destiny been written that he will confront the World Serpent in the nightmarish days of Ragnarok. It is a clash that will shake creation, rivalling any battle in history, and one that neither Thor nor Jormungandr may ever walk away from.\\n\\nWoe to any who hears the trumpets of Ragnarok, for they herald the coming of Jormungandr, the instrument of their annihilation. The World Serpent exists as the bearer of the end times, the collapse of all creation. Who could hope to oppose such power?","name":"Jormungandr","pantheon":"Norse","roles":["Guardian"],"title":"The World Serpent"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/nimble-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lash.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/incense.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/destruction.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/marked-for-death.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/kali.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/kali.jpg","lore":"To speak of Kali is to speak of the beginning of time itself.\\n\\nAcross the majestic lands of Hindustan rose an army of demons that conquered the countryside and slaughtered the people. Yet, when the Gods themselves were defeated, Devi, the supreme Goddess, emerged to throw back this host and protect the faithful.\\n\\nThree forms she took during these ancient times. The first, Durga, the Mother of Creation, was as radiant as she was fearsome. Astride her tiger, she scattered the demon horde until she encountered the horrendous Raktabija. For each wound she gave the demon, his cursed blood created a copy, quickly resulting in an unstoppable army of Raktabija clones. Rage boiled at the corners of Durga’s mind, in the quest to slaughter and destroy evil.  From the forehead of Durga sprung her wrathful form, with skin darkened and eyes glowing a menacing red.\\n\\nThus was Kali, the Black One, Goddess of Time and Destruction, the second form of Devi born.\\n\\nRarely has Kali been seen since, kept in the shadows of Devi’s mind, but when the tides of battle shift and evil looms large, there is no solution but unrestrained destruction of evil, and Kali once again, walks the Earth.","name":"Kali","pantheon":"Hindu","roles":["Assassin"],"title":"Goddess of Destruction"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/abduct.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rising-dawn.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/solar-flare.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/scarabs-blessing.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fortitude.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/khepri.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/khepri.jpg","lore":"At dawn, the sun lifts above the horizon, bathing mankind in color and life. At dusk, it sinks beneath the edge of the world, lost to sight, casting all into darkness. While the sun shines on the realm of mortal kind it is radiant Ra that guides it, but at night we share the sun with the underworld. It is not Ra that moves the sun along its subterranean path but Khepri, the scarab God, he who comes with the dawn.\\n\\nScarabs form dirt and dung into perfect spheres. Within, they lay eggs from which their young emerge fully formed. Using powerful arms and legs, scarabs can roll these spheres - many times their own size - incredible distances. It is from their father, Khepri, the sacred scarab gained this power. For the Dawn Bringer, the Sun is his sphere and all souls, living and dead, his children.\\n\\nKhepri is a guardian, a protector and a friend. He is a symbol of power and loyalty. Usually content to stay aloof, Khepri has risen for battle to defend existence from this shattering war. He will fight to shield us until the final sunset. Yet, it is he that brings the dawn.","name":"Khepri","pantheon":"Egyptian","roles":["Guardian"],"title":"The Dawn Bringer"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overhead-slash.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/battle-stomp.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/twin-cleave.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sundering-strike.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/steadfast.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/king-arthur.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/king-arthur.jpg","lore":"It is often in the time of greatest strife, when a land and its people rest on the precipice of destruction, that a hero shall rise to deliver them from ruin. So it was in the ancient land of the Britons, a realm torn asunder by darkness and war, that the greatest king they would ever know would come. He was Arthur, son of Uther Pendragon, King and Warden of Camelot.\\n\\nHis coming was prophesied by the great wizard Merlin, glimpsed in a comet burning though the night sky, herald of the monarch who would unite all Camelot and usher her into a new age of peace and prosperity. Though little older than a boy when King Uther fell and the mantle of ruler was passed down to him, Arthur would rise and take hold of his destiny as savior of his people. Benevolent and adept in statecraft, honourable and cunning in war, Arthur was the symbol of a new Briton.\\n\\nIn his hand is Excalibur, that mythic blade of divine power that only the most just of rulers may wield. Ever since the fateful day she first came into his possession, the sword has never left Arthur’s side, and countless are the foes he has brought low with her, the blade’s power amplified even further by his exemplary prowess in battle.\\n\\nArthur has withstood any foe who has sought Camelot’s downfall, be it the numberless hordes from beyond the seas or the sinister plots of those from within his own house. No matter the scheme, or the enemy, with the aid of his mage Merlin and his knights, Arthur has prevailed, for so long as he draws breath, Camelot’s lord shall not rest until her safety is won.\\n\\nNow, the great King hears the call of Avalon, and answers.","name":"King Arthur","pantheon":"Arthurian","roles":["Warrior"],"title":"Wielder of Excalibur"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/zephyr.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/slipstream.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/whirlwind.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spirit-of-the-nine-winds.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/power-of-the-wind-jewel.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/kukulkan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/kukulkan.jpg","lore":"Upon the high winds of Maya lands rides the feathered serpent, Kukulkan. Awesome and terrible to behold, majestic yet sinister, Kukulkan embodies the danger and beauty of a double-edged sword.\\n\\nTime has worn away knowledge of this God like the breeze over stone. Perhaps Kukulkan prefers this. He is known by many names and worn the face of man and beast - and worshipped with the kind of reverence born of fear.\\n\\nDotted across the vast forests of the Maya lands stand great pyramids bearing his serpentine likeness, architecturally perfect so as to catch the light and bring to life those slithering stone statues. Painted in blood, sacrifices were made upon these sites to appease Kukulkan. He is the lord of death and rebirth.\\n\\nTo the world, he brought the four elements, but of wind he keeps control. A great gem, worn about his sinuous neck is said to be the source of all air.\\n\\nTo the people, he brought the calendar. That glorious, portentous stone disk, which counts time to a distant future, only to stop abruptly and with horrifying finality.\\n\\nTo the battlefield, he brings a legacy of power and domination. Sacrifices made for his favor were measured in blood, but mortal blood is weak. It seems that, for Kukulkan's ultimate appeasement, the blood of a God is required.","name":"Kukulkan","pantheon":"Maya","roles":["Mage"],"title":"Serpent of the Nine Winds"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/throw-back.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/groggy-strike.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mighty-yawn.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/epic-uppercut.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sleepy.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/kumbhakarna.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/kumbhakarna.jpg","lore":"Do you hear it? That distant rumble like thunder across the mountains? Like pitched battle from miles away? Like a stampede of elephants across the plains? Know it is none of these things. That rumble you hear is the bellowing snore of Kumbhakarna, the Sleeping Giant.\\n\\nQuick with a laugh, honest with friends, but devastating in battle, Kumbhakarna embodies the traits of a hero, but loyalty to his tyrant brother, Ravana, often leads him to the wrong side.\\n\\nSo jovial and pious is he, that when granted a boon by Brahma, Kumbhakarna wished to take Indra's place and rule the Heavens. Indra was jealously threatened, convinced Brahma would let the good-natured giant usurp him, and magically twisted Kumbhakarna's tongue at the last second. Instead of asking for “Indraasana” (Indra's Seat), he asked for “Nidraasana,” ... to sleep.\\n\\nNow, Kumbhakarna is a dozing behemoth, waking only once every six months. Yet, Ravana is concerned with the growing fervor of the battle between gods and demons, sensing his dominion slipping. Prematurely, he has awoken his brother and pressed him to fight. Though reluctant, as if he knows his brother's stance is unjust, Kumbhakarna fights out of loyalty and a warrior's code.\\n\\nNow, that rumbling you hear, it is not his snores, but Kumbhakarna's mighty roar. Or was that a yawn?","name":"Kumbhakarna","pantheon":"Hindu","roles":["Guardian"],"title":"The Sleeping Giant"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/nene-kappa.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shell-spikes.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sumo-slam.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/watery-grave.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/water-bowl.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/kuzenbo.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/kuzenbo.jpg","lore":"Kappa are devious creatures. They linger just below the surface of rivers and lakes, waiting for mortals to test the water before snatching and drowning their fleshy meal. Taken merely at their appearance and juvenile sense of humor, they could be mistaken for mischievous turtle-men, almost playful in a rude sort of way, but they are dangerously strong and ruthless when submerging their prey. King among these monsters is Kuzenbo; bigger, stronger, and more cunning than the rest, but just as infantile.\\n\\nKuzenbo led his nine thousand Kappa followers to Japan, where they harried river villages and fishing boats, using their unnatural strength to pull mortals below. So clever, so hungry had the Kappa become, that Japan’s army marched to fight back, but they were no match.\\n\\nAs the bowl-shaped indentation atop a Kappa’s head is filled with water, that Kappa grows impossibly stronger - far stronger than a mortal. Yet, bound by their strange sense of honor, a Kappa must bow when bowed to, spilling their power upon the ground. It is the only known way to defeat one.\\n\\nAnd of the countless battles Kuzenbo has fought, he was defeated only twice. Upon his second defeat at the hands of General Kiyomasa, Kuzenbo was forced to swear to never again sow strife between man and beast. A vow the Kappa King has honored ever since.\\n\\nGods, however, are fair game.","name":"Kuzenbo","pantheon":"Japanese","roles":["Guardian"],"title":"King Kappa"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vanish.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/agonizing-visions.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flurry-strike.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/assassinate.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/behind-you.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/loki.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/loki.jpg","lore":"Villain. It’s a word used to describe those that break the rules, that take what they want, and care nothing for those hurt along the way. Loki, the trickster God, would say villainy is nothing more than a point of view.\\n\\nThe point of view of fools too mindless to seize opportunity.\\n\\nOf course, with Loki now on the loose, the implications are dire. The end of times may be at hand. The final battle, Ragnarok, possibly on the horizon, for it was foretold that Loki would break free of his prison and herald the horrific final battle that would leave the Gods slain, the heavens sundered, and the world in ashes. None are more eager for that time of chaos than Loki.\\n\\nBefore his confinement, Loki’s malicious mischief managed to affect every God in ways both beneficial and terrible. Yet Loki’s most heinous act was in the death of the God of light, Baldr.\\n\\nBaldr’s prophetic dreams showcased his own death. Fearful for her son, Frigg forced all objects of the world to swear never to harm him. All save mistletoe. Cruelly amused, Loki forged a spear from the plant and provided it to Baldr’s brother Hodr. The Gods had a new favorite game, hurling objects at Baldr and laughing as they harmlessly ricocheted. So Hodr threw the spear, but, to everyone’s horror Baldr was impaled. Hel agreed to release Baldr from the underworld if all creatures of the world mourned the God of Light.  And all did, save one crone who refused. So Baldr died.\\n\\nWhen it was discovered the crone was Loki in disguise, the furious Gods bound him in entrails and hung a venomous serpent overhead. Loki’s wife, Sigyn, collected the dripping venom in a bowl, but when she was forced to empty it, Loki was struck, causing such anguish his thrashing would shake the world.\\n\\nBut now Loki is free and already wreaking havoc. If the prophetic Volva are correct, and they always are, then the end of all things has finally come.","name":"Loki","pantheon":"Norse","roles":["Assassin"],"title":"The Trickster God"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/viper-shot.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/acid-spray.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lacerate.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/petrify.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sidewinder.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/medusa.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/medusa.jpg","lore":"All monsters are hideous and fearful, but some are worse than others. There is only one whose hair is made of slithering serpents, only one with skin of scales, and only one whose very gaze can turn man, beast, or God to stone. Medusa, the Gorgon.\\n\\nStories claim she was beautiful once. A priestess of Athena. Loyal and devout in action, but Poseidon was determined to make her his own. It was the fairness of her features, the golden of her hair, that attracted the Sea God. Medusa, a mortal maiden, could not refuse.\\n\\nWhen Athena learned of Medusa's betrayal, she punished the priestess. Those fair features were hideously wrought and those golden locks twisted to hissing vipers. Anyone that met her eyes was petrified – a statue for all eternity.\\n\\nMedusa fled, frightened, ashamed and furious. For years she hid from the world, nursing a festering hatred for all things, craving beauty but having none, seeing none, until she became the monster she appeared to be.\\n\\nShe slithers now to the field of battle. Those wretched features concealed behind a cruel mask of porcelain perfection, eyes burning from within. All that she perceives, all that is wonderful in this world, she seeks to destroy. Perhaps then she will be the fairest monster of them all.","name":"Medusa","pantheon":"Greek","roles":["Hunter"],"title":"The Gorgon"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/made-you-look.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/maximum-velocity.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/special-delivery.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sonic-boom.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fastest-god-alive.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/mercury.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/mercury.jpg","lore":"Mercurial. A word that evokes volatility, quickness, and cunning. But to compare anything to the speed and wit of the Messenger God Mercury would be to compare a hot day to the searing forge of Vulcan, or a blooming rose to the glory of Venus. It is but a pale comparison. Mercury can leap the space between lightning and thunder, outfox the fox king, and reach tomorrow before the sun.\\n\\nAs an infant, Mercury escaped the watchful eye of his half-brother, Apollo, stole his cattle, fashioned a lyre from a tortoise shell, and snuck in a nap, all before Apollo found him missing. His father, Jupiter, found the child’s mischief boisterously entertaining, and awarded him the task of delivering messages for the Gods, traveling between the Heavens, the Earth, and even to the depths of the Underworld.\\n\\nNow war looms and Mercury races to keep the lines of communication open, though he is often caught in the thick of battle. No stranger to combat, he once slew the monster Argus, the demon with one hundred watchful eyes, using speed and guile alone. But this war is different. The foes are stronger, the stakes higher, and Mercury a pivotal cog in the machine. Should he fail to deliver even a single order the balance could tip, and the time left for this world would be truly mercurial.","name":"Mercury","pantheon":"Roman","roles":["Assassin"],"title":"Messenger of the Gods"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eclipse.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vortex.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flicker.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/elemental-mastery.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overload.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/merlin.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/merlin.jpg","lore":"Many know the legend of King Arthur, and yet the man who set that legend into motion remains shrouded in mystery. His origins, and the source of his power, are secrets known only to him. Even his very nature is questioned. Is he simply a man greatly adept in the magical arts? A demon? Or something in between? Whatever the answer, what is beyond doubt to all who encounter him is that Arthur’s right hand, the great wizard Merlin, is a being of immense wisdom, and formidable strength.\\n\\nIn the ages of warring kings, where ruler vied against ruler and only the strongest rose to rule the land, Merlin pledged his skills in service to great sovereigns as both an advisor and a devastating battle mage. A collector of secrets and ancient lore, Merlin is a master of arcane wizardry, able to wield a myriad of elements and harness them to his will. He also devoted his mind to the art of prophesy, one day foreseeing the rise of a ruler destined to stand above all others, and unite the land beneath his banner.\\n\\nWhen Uther Pendragon fell in battle against the barbarous hordes of the invading Saxons, Merlin swore an oath of fealty to his successor, Arthur. From that day, the mage never left the wielder of legendary Excalibur’s side, a tireless advisor, fellow warrior, and friend. Together they brought about the rise of Camelot, and the unity of a once fractured land. The foul Saxons were driven back across the distant sea, and the people of the kingdom knew peace, justice and prosperity.\\n\\nTo any who think to cross Merlin, beware. Many have tested him, seeking his knowledge, his secrets, or the source of his power for themselves. And few, if any, have lived to tell their tale.","name":"Merlin","pantheon":"Arthurian","roles":["Mage"],"title":"The Master Wizard"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sigil-mastery.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dragonflight.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shroud-of-wildfire.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/consuming-power.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/empowered-blade.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/morgan-le-fay.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/morgan-le-fay.jpg","lore":"Tales are spun and the soft murmurs of the name Morgan Le Fay are whispered in groves, villages, and kingdoms alike. The dark enchantress of ill repute was not always so, and her story matured in the great kingdom of Camelot itself.\\n\\nMorgan Le Fay roamed the courts of Camelot inspiring awe and drawing many a knight’s gaze in her direction. In the libraries, she was found tutoring under the master wizard, Merlin. It was in those dusty halls, filled with arcane grimoires, tomes and parchments littered with enchantments, that she learned to hone in on her talents as a sorceress, revealing new avenues of power that were previously hidden.\\n\\nKing Arthur and Morgan Le Fay grew closer over their time together in Camelot, frequently seen hand-in-hand at the royal dances, side-by-side in the war room discussing strategies and plans of attack. There was another, however, that did not enjoy how close the two were getting.\\n\\nQueen Guinevere lurked those same hallways, quiet and frustrated to be seemingly left behind and forgotten. In those moments alone that she still maintained with the King, she sowed seeds of distrust in Arthur’s mind and from Arthur in turn to Merlin.\\n\\nThe schemes were brought to fruition after a heated exchange took place between Morgan Le Fay, King Arthur and Merlin. Angered at being shamed for trivial reasons in full view of his loyal subjects, Arthur used the arsenal of thoughts provided by the Queen and brandished them as a weapon against Morgan Le Fay. She was accused of insubordination and conspiracy to usurp the throne. Abashed at the groundless allegations and bitter that not even her mentor would come to her aid, Morgan Le Fay’s sorrow transformed into utter fury as she condemned the royal pair. Turning away, she blast open the doors of the throne room, leaving them broken and charred as she walked away from Camelot, making a decision at that moment only to return when she was prepared to truly take the throne.\\n\\nWith Tiamat’s arrival, the gods on edge and unprepared, that time has finally come.","name":"Morgan Le Fay","pantheon":"Arthurian","roles":["Mage"],"title":"The Dark Enchantress"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cross-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spear-thrust.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/grapple.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divine-mastery.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/training-arc.jpg","godCardURL":"
