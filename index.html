https://webcdn.hirezstudios.com/smite/god-cards/mulan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/mulan.jpg","lore":"There are many stories about the girl who became a hero. Most are embellished, the events polished to a legendary sheen. They say that Hua Mulan was blessed, that her bow and blade were gifts of the gods. That she was wise beyond measure, and stronger than a hundred warriors, for her heart was pure. That she became the sworn sister of the king’s daughter. That she returned home and married a prince, or perhaps a farmer. That she died.\\n\\nBut every story, no matter how outlandish, has a grain of truth to it. And this is the truth of Hua Mulan. China was invaded and a man from every family was called to serve in the army. But her father was old and her brother a child, and so for love’s sake, she set aside her loom and went to war in their place. She disguised herself as a young man, and no one was the wiser, for her father had trained her in the ways of the bow and the blade, making her the equal of any man in the army.\\n\\nFor twelve years, she maintained the pretence. She fought well against the enemies of China, attaining rank and the loyalty of her fellow soldiers. She led men into battle more than once, setting herself where the fighting was thickest so that those who followed her might see her and take heart. At the end of that twelve years, she was offered a high rank, but turned it down. Instead, having grown tired of war, she asked only that she might return home to her family. And so she did, her duty complete.\\n\\nBut some stories do not end when the hero returns home. For some stories, that is only the beginning. For now, a new danger stirs, and Hua Mulan must once more take up her weapons in defense of her homeland...","name":"Mulan","pantheon":"Chinese","roles":["Warrior"],"title":"The Ascendant Warrior"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/universe-ring-toss.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flaming-spear.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/armillary-sash.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wind-fire-wheels.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/righteous-spirit.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ne-zha.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ne-zha.jpg","lore":"Born to innocence, forced to fight, destined to be a hero, the child-god, Nezha, defends those that cannot defend themselves, especially against tyrant Gods.\\n\\nFor three and a half years, Nezha’s mother carried him in her womb. During this time, the Dragon Gods, led by Ao Kuang, terrorized the people, sending floods and storms, and demanding not just food, but child sacrifices to feast upon as well.\\n\\nInto this world was Nezha born, a full grown boy with laughter in his eyes, trained by the immortal sage Taiyi Zhenren, who gave him the powerful Universe Ring and Armillary Sash. Youthful and carefree, Nezha was also headstrong, often arguing with his father what was right and wrong.\\n\\nBut youth does not last forever, and Nezha’s life changed defending two friends against a captain of Ao Kuang’s army. Insulted, the Dragon God commanded his third son, Ao Bing, to defeat the boy, but in the end, Nehza slew his opponent. Furious with grief, Ao Kuang demanded Nezha’s father make reparations for the offense committed by his son, or he would send floods and storms to ravage the land. Nezha, humbly, sacrificed himself to appease the Dragon God, but evil Ao Kuang sent storms anyway.\\n\\nTaiyi Zhenren worked his wisdom, and from the petals of a Lotus plant, Nezha was reborn. The immortal sage gave him new weapons – the Fire Tipped Spear and Wind Fire Wheels – weapons to challenge even the Dragon God and defeat him once and for all.\\n\\nTime has passed since Ao Kuang’s ruin, but the winds of war are rising and new Gods of Tyranny challenge the safety of the defenseless. Once again, Nezha will set aside his youth and stand against the tide, for not even death can stop him.","name":"Ne Zha","pantheon":"Chinese","roles":["Assassin"],"title":"the Third Lotus Prince"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spirit-arrow.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unravel.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/backflip.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/world-weaver.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/broken-weave.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/neith.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/neith.jpg","lore":"When time began, there was only endless black waters. Yet, from water comes all life, and from this primordial force was born the first of Goddesses, Neith.\\n\\nAs the waters continued to form the world and everything within it, Neith’s natural instinct to protect and nurture the people led her to champion the hunt. With meat she fed them and with hides she clothed them, but as the people she sought to protect grew old, or sick, or died on the battlefield, Neith’s compassion forced her to change her calling.\\n\\nWith nimble fingers, the Goddess wove shrouds to shield the lost spirits of the dead on their journey to the underworld, leaving a loose thread she could trace as the ghosts ventured down the river. As time passed, more and more threads spread across the world, weaving an intricate pattern of fate that only Neith could see.\\n\\nNow, the war between Gods grows ever more fevered, and Neith can no longer sit idle. The threads of fate are fraying at the edges and she must once again pick up her bow and hunt, or watch the world return to the waters from whence it came.","name":"Neith","pantheon":"Egyptian","roles":["Hunter"],"title":"Weaver of Fate"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/swift-vengeance.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/slice-and-dice.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/retribution.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divine-judgement.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/scales-of-fate.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/nemesis.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/nemesis.jpg","lore":"Of arrogance and pride, the Greeks have but one word: hubris. It is a crime against Gods and Men, but a crime many commit with impunity. Even mighty Zeus is guilty. But when punishment is due, there is one from whom even the God of Thunder shrinks. She is Nemesis, the red-washed blade of Divine Retribution.\\n\\nRecall the tale of Narcissus, so taken by his own beauty. Proudly, his visage was flaunted, to the detriment of all. Until, at last, he was led to a pond of crystal hue where his own reflection enraptured him. So long did he remain to gaze upon this self-image that hunger claimed his life. Thus does Nemesis respond to hubris. It is consequence equal to the crime.\\n\\nNow, behold the war torn land, beset by the wrath of wanton Gods filling the air with blood and boasts. This battlefield is stained with hubris. Unwittingly, these foolish warriors have summoned their greatest adversary. Nemesis has come!\\n\\nNo longer will foul deeds engender success, no hoard of wealth held in undeserving hands, no legends told when falsely earned. Nemesis will unleash a tide of retribution. Punishment for the crime of hubris is death.","name":"Nemesis","pantheon":"Greek","roles":["Assassin"],"title":"Goddess of Vengeance"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rend.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/barrier-formation.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/valiant-leap.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sentinel-of-zeus.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/to-victory.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/nike.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/nike.jpg","lore":"It is often said that history is written by the victor. If that is true, then history is shaped by a single Goddess: Nike, the winged warrior.\\n\\nWhen the fastest runner bears a golden medal, when a cunning hunter slays the fiercest beast, when the soldiers seize the day, the Faithful of Olympus praise Nike. Without her favor, failure is ensured, and obscurity certain.\\n\\nEven mighty Zeus, a king among Gods, seeks the favor of Nike. On the smoke strewn fields of antiquity, when the God of Thunder marched against his Titan forebears, Nike fought by his side, her dauntless blade inspiring confidence in her allies as they faced an impossible foe. Without her, all the heavens are left to wonder if Zeus would have carried that day. Had Zeus fallen, the world as it is known would have fallen with him.\\n\\nSo, all hail the victor! She has finally taken the field. As Gods and Gorgons clash and battles most fierce and foul are fought, she alone shapes the day. For history is written by the victor, and Nike is victory incarnate.","name":"Nike","pantheon":"Greek","roles":["Warrior"],"title":"Goddess of Victory"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shadow-lock.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/siphon-darkness.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shadow-step.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/night-terror.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flame-of-the-night.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/nox.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/nox.jpg","lore":"So fragile is the line between sleep and death, the difference only waking with the dawn. In that darkness she reigns, as the sun sinks below the horizon, as stalkers hunt their prey, as shadows thicken to consume the light. She is primal in a way that even the mightiest of Gods must fear, for she is the Goddess of Night, Nox, and from her was born all the certainties of life.\\n\\nFriendship and Love, Sunsets and Dreams, these are the Gods of inspiration. Nox is mother to them all. So too is she the mother of misfortune: Doom and Blame, Deceit, Strife, Woe and Death. Nox must love and protect all her children equally, as any mother would. They are her calling and her curse; her greatest pride and deepest shame. It is for her children she has now come to war.\\n\\nClothed not in black, but blackness, Nox is rarely seen. She glides between the light, just at the edge of vision. A specter. Even the God of Thunder is known to fear her, for Nox could steal his whispered breath and send him to a sleep eternal where dreams do not exist and no one ever wakes with the dawn.","name":"Nox","pantheon":"Roman","roles":["Mage"],"title":"Goddess of Night"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mysterious-fog.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/clay-soldiers.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shining-metal.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fire-shards.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/strength-of-wood.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/nu-wa.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/nu-wa.jpg","lore":"When two warring Gods shattered the World Pillar, Heaven and Earth dangerously shifted, and Armageddon was unleashed. Firestorms, floods, and bloodthirsty monsters ravaged the land and stole the lives of more than can be counted. In ages past, Nu Wa, Guardian of Heaven and Earth, hand-crafted all people from clay. They were her creations, her children, her responsibility.\\n\\nAs the Earth shuddered and broke, and the skies turned black with ash, Nu Wa forged five mystic stones, one for each of the elemental forces of nature: Earth, Water, Fire, Wood, and Metal. With the power of these stones, she slew a gargantuan tortoise, severed its legs, and raced to the broken World Pillar. One leg she used to prop the Heavens aloft and with the elemental stones, she sealed it in place. Balance between Heaven and Earth was restored, but the world was never the same. Skies cleared, but the stars had shifted. Seas retreated, but rivers drained westward. Everything leaned, but the End was averted.\\n\\nIn the years that followed, Nu Wa and her brother, Fu Xi, took the throne of China. They ruled with wisdom and ushered in an age of recovery and prosperity, for which she is adored and worshipped to this day.\\n\\nYet, the skies grow dark once more and chaos threatens to engulf the land. Gods from all Pantheons have chosen Earth as a battleground, trading blows with the same thoughtless fervor that destroyed the World Pillar so long ago. Determined to prevent such calamity from repeating, Nu Wa has summoned the elemental stones once more. For she is the Guardian of Heaven and Earth; all mankind are her creations, her children, her responsibility.","name":"Nu Wa","pantheon":"Chinese","roles":["Mage"],"title":"Guardian of Heaven"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lunge.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/raven-shout.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/gungnirs-might.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ring-of-spears.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/path-to-valhalla.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/odin.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/odin.jpg","lore":"Mightiest of the Aesir, warrior and king, the All-Father is a doomed God.\\n\\nIt seems strange to imagine a God concerned with his fate, but Odin regularly consults the volva, the seers in the North. They speak of a final war, Ragnarok, when the mightiest Gods are slain and the world is consumed by the sea. For this day, Odin constantly prepares.\\n\\nThe All-Father can trace his lineage to the evil Frost Giant, Ymir, whom he slew with the aid of his two brothers, Vili and Ve, and with his remains forged the world. Atop Asgard, where Odin presides, he is known as the bringer of war, a sage of wisdom, and the keeper of souls slain in battle.\\n\\nAs a warrior, Odin rides his eight legged steed, Sleipnir, and wields the mighty spear Gungnir. Accompanying him are two wolves and his two trusted ravens, Huginn (thought) and Muninn (memory), who fly around Midgard and return to Odin with all they see and hear.\\n\\nAs a sage, Odin travels disguised as a simple wanderer, seeking wisdom. His thirst for knowledge has come at great personal cost, having been hanged from the branches of Yggdrasil, the world tree, for nine days and nights and sacrificed one of his eyes to the Well of Wisdom.\\n\\nAs keeper of souls, Odin welcomes slain warriors to his mighty hall of Valhalla on the agreement they will aid him at Ragnarok. Favored female warriors become his elite Valkyrie that usher those worthy of entry to Valhalla.\\n\\nIt is in preparation for the final days of Ragnarok he does all this. For the seers claim his death will come at the fangs of the great wolf Fenrir, and like anyone, Odin seeks to change his fate. Yet, never once have the volva been mistaken.","name":"Odin","pantheon":"Norse","roles":["Warrior"],"title":"The Allfather"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/focused-light.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overflowing-divinity.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/consecration.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sanctified-field.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/touch-of-fate.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/olorun.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/olorun.jpg","lore":"As the mountains and the seas have their gods, so too do the stars in the heavens. Greatest of their number is Olorun, God of the Sky and the Heavens, and supreme deity of the Yoruba pantheon. It was Olorun who kindled the spark that would become the sun, and at his command, the Orishas – the Yoruba gods – crafted the world and its inhabitants from the gathered dust of the cosmos.\\n\\nBut though Olorun is the greatest of the Orishas, he seeks no worshippers and asks for no offerings, yet entire nations follow his ideals. Like the stars, he is a remote deity, content to sit in quiet contemplation of the myriad wonders of creation. And he is powerful enough to ensure the sanctity of his solitude. Olorun commands the fundamental forces of the cosmos – even time itself.\\n\\nYet despite this power, Olorun is but one part of a greater whole. A tripartite being, Olorun possesses two other aspects – Olodumare, creator of the universe, and Olofi, the conduit between Earth and the Heavens. As befits a being of such might, Olorun is wise beyond measure, and rarely acts rashly or without some greater purpose in mind. Peaceful by nature, he will nonetheless fight when the need is great.\\n\\nIt is for that very reason that Olorun has chosen to break his long seclusion at last. Despite having held himself apart from the world, he has borne witness to the suffering of mortal and immortal alike. With his far-reaching gaze, he has seen that the thrones of the great pantheons are empty, and that god wars against god.\\n\\nIn his great wisdom, Olorun has realised that only a king can unite them.\\n\\nAnd he will be that king. ","name":"Olorun","pantheon":"Yoruba","roles":["Mage"],"title":"Ruler of the Heavens"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sickle-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spirit-flail.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/judgement-tether.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lord-of-the-afterlife.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fragmented.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/osiris.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/osiris.jpg","lore":"Never has there been, nor shall there be a king more perfect than Osiris. Son of the Earth God, Geb, Osiris was divine royalty by birth, and all the land his birthright. Benevolence and prosperity were the hallmarks of his reign. Would that he had been left to shape the world, but the jealousy of his brother, Set, changed the course of fate.\\n\\nSeeking to usurp the throne, Set deceived and murdered his brother, tearing his body to pieces and casting them across the land. Eset, Osiris’ wife, secretly fled while Set plunged the kingdom into darkness. For years she toiled to reassemble her husband while his spirit form, his Ba, endured. Yet for all her searching, she could not find every part of him, and Eset was forced to reanimate Osiris without. Though not strong enough to defy Set in this incomplete form, Osiris gave Eset a son that would topple the tyrant Set and restore balance to Egypt.\\n\\nWhat remains of Osiris is a fragment of what he once was. Robbed of his crown over the earth, he now governs the realm of the dead with the same benevolence he ruled the living. But darkness looms again, and though broken, Osiris refuses to sit idly by. Mustering the last of his strength and spirit, Osiris seeks to change the course of fate, this time for the light over darkness.","name":"Osiris","pantheon":"Egyptian","roles":["Warrior"],"title":"Broken God of the Afterlife"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pyroclast.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eruption.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/magma-rush.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/volcanic-lightning.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/everlasting-flame.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/pele.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/pele.jpg","lore":"Pele is the goddess of Fire, of Dance and Wind, of Volcanoes and Violence. Those who worship Pele speak of her as Madame Pele or Tutu Pele, while others know her as Ka wahine ‘ai honua, ‘the woman who devours the land’. Though she is capable of great acts of destruction, and possesses the temper to provoke such acts, Pele is both destroyer and creator. It was through her mastery over the world’s molten core that she wrought the Hawaiian Islands into being, forging them from the lava that ruptured forth from the mouths of her volcanoes. They are places of immense beauty, lush and brimming with life, and by looking upon and revelling in such beauty, you offer Pele worship.\\n\\nBorn of Kane Milohai, who wrought the earth, sky and heavens, and the Earth goddess Haumea, Pele is one of fourteen children, seven sisters and seven brothers. It is from the enmity between these siblings that Pele arrived in Hawaii, after her exile at the hands of Kane Milohai for her fiery temper and conflict with her sister Namakaokahai, goddess of the Sea. Pursued across the oceans by Namakaikahai, Pele wrought Hawaii into a paradise, making her home within the great calderas of the volcanoes that stand sentinel across the island chain.\\n\\nTo worship Pele is to grant one’s devotion to a goddess of terrible power, one who can shape and render a grand, vibrant world into being at her slightest whim, and burn it to ashes just as quickly. But just as her worshippers are devoted to Pele, she devotes herself to them as a force of divine protection and care. She is a tireless defender of life and the people that dwell upon her islands, and any that seek to threaten them shall surely taste Pele’s fire.","name":"Pele","pantheon":"Polynesian","roles":["Assassin"],"title":"Goddess of Volcanoes"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bone-rush.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/harvest.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flourish.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/grasp-of-death.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pomegranate-seeds.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/persephone.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/persephone.jpg","lore":"Persephone is the Goddess of Vegetation and the Harvest. Daughter of Zeus and Demeter, the others gods often felt fit to decide her fate for her. Demeter enrolled her in helping with her Mysteries while Zeus took it upon himself to give her away. Hades, her husband to be, came up from the underworld and took her away. Demeter, saddened by the loss of her daughter and helper, wept and refused to continue bringing life to the earth. Cornered by a dying world, Zeus forced Hades and Persephone to part.\\n\\nBefore leaving the underworld Hades offered her a seed of a Pomegranate grown in the underworld. Persephone was clever. She understood what was being offered. Those who eat the food of the underworld are bound to it and must return. Hades was offering her a choice. A choice she was happy to accept. Every six months Persephone leaves the underworld, soothing Demeter’s grief and bringing life back to the world.\\n\\nThe time has now come for Persephone, Queen of the Underworld, to return and take her throne besides Hades. She has seen the gods struggle against themselves at the expense of those around them. She can no longer watch as droves of mortal souls arrive; their lives cut short while they struggled for each and every victory as the gods they pray to cause their suffering. Soon all gods will see why she is called ‘Clever Persephone’.","name":"Persephone","pantheon":"Greek","roles":["Mage"],"title":"Queen of the Underworld"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tidal-surge.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/trident.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/whirlpool.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/release-the-kraken.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/changing-tides.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/poseidon.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/poseidon.jpg","lore":"Deep beneath the turbulent tides of the ocean lingers a God of idle rage. What must it be like to live forever in the shadow of your brother? To be denied again and again that which you desire, despite the power of the wrathful seas at your command? So Poseidon broods on his throne at the ocean floor.\\n\\nAs a child, Poseidon and his brother, Hades, were consumed by their father, Cronus. Powerless to escape, it was left to mighty Zeus to free them and slay their patron. Together, they defeated the last of the Titans and ushered in a new age of dominance for Olympian Gods, but their freedom, their very lives, Zeus would never let either brother forget were owed to him. Even as the heavens, the underworld, and the seas were divided among them, Zeus positioned himself as king of all, and what was Poseidon to do but be thankful he had been spared a fate in his father’s belly? So he retired to his new realm and began the pursuit of gathering worshippers.\\n\\nSoon rose a great ocean front city of mankind, and Poseidon presented himself as their God, but another had already come, Athena, Zeus’ daughter. A competition was held – each God would offer a gift and the people would select their sponsor. Confident, Poseidon drove his Trident, a trophy from the battle against the Titans, into the ground and a limitless spring emerged, but the people found the water salty and undrinkable. Athena extended her hand and a graceful olive tree rose from the earth. Wood, food, and oil, all from one gift. The people decided and the city was called Athens.\\n\\nIt may be that Poseidon never desired greatness as Zeus did. Had his father never consumed him, had he never been made God of the Sea, had his brother never crowned himself King of the Gods, Poseidon might have lived contentedly, but that chance is gone. Now, with the very tides at his command, an army of sea beasts at his back, and the formidable Kraken at his call, the glowering God of the deep seeks to quench his thirsty rage and plunge all the world in endless, wrathful seas.","name":"Poseidon","pantheon":"Greek","roles":["Mage"],"title":"God of the Oceans"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/celestial-beam.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divine-light.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/solar-blessing.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/searing-pain.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/speed-of-light.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ra.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ra.jpg","lore":"Without the sun, there would be no light, no warmth, no life. Without Ra, there would be no sun.\\n\\nRa is a guardian, the keeper of Ma’at - order and truth, and master of the sun. Each day he sails across the sky in a golden ship, and each night traverses the underworld, bringing light and warmth to the dead beneath the horizon. For those in the scorched South, Ra was the first God, creator of earth and sky and father to all other Gods.\\n\\nBut Ra’s time is fading like a twilight sky. His descendants have grown in power and prominence and seek to replace him as the figure of authority. His own granddaughter, Eset, cleverly poisoned him by secretly summoning a viper under his feet. When he stepped on it, the serpent’s venomous bite poisoned him. Eset promised to heal Ra if he revealed to her his True Name. At first, he refused, for knowledge of his True Name would give Eset unparalleled power over him, but as the pain mounted, Ra was forced to relent. Eset kept her word and Ra was healed, though the cost may have been too high.\\n\\nLight can heal, but light can also burn, and the great protector is showing signs of wrath not seen since mankind’s insolence. In that rare moment of anger, Ra sent his daughter, Hathor, in the form of a lion, to devour the people. However, he ended her bloody feeding before she consumed all mankind. This time, his burning gaze is set on the other Gods. When his wrath finally cools, nothing may be left but ash.","name":"Ra","pantheon":"Egyptian","roles":["Mage"],"title":"Sun God"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/percussive-storm.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/raiju.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/thunder-crash.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/taiko-drums.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/charged-tempo.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/raijin.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/raijin.jpg","lore":"Thunder is a terrifying element, trembling the very earth with its sound. Herald to storms, accomplice to lightning, thunder is primal, powerful and chaotic. Let this speak, then, of its master, the demon faced God, Raijin, who summons this force with the pounding of his great drums.\\n\\nEver in conflict with his equally fearsome brother, Fujin, Master of Wind, Raijin vies for control of the skies above the Realm of the Rising Sun. For mortals, their battles form dramatic storms and devastating tidal waves, but for the brothers, this is just friendly competition; an ongoing tournament to determine the strongest.\\n\\nThough monstrous in appearance and intimidating in battle, Raijin is generous to his Faithful, clearing the detritus with lightning to leave rice fields all the more fertile. That doesn’t stop parents from warning their children to hide when a storm comes, lest Raijin devour their bellies. Raijin no doubt finds this tale amusing but has yet to actually feast on any toddlers.\\n\\nWar has reached the distant shores of Raijin’s island realm, and for the first time, he has encountered other Gods that claim dominion over lightning, thunder, and the sky itself. Relishing this opportunity to prove dominance, Raijin enters the fray, drums pounding, and his boisterous laugh indistinguishable from rolling thunder.","name":"Raijin","pantheon":"Japanese","roles":["Mage"],"title":"Master of Thunder"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/astral-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/infinite-arrows.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rolling-assault.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/astral-barrage.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/astral-quiver.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/rama.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/rama.jpg","lore":"Ravana's immortal reign subjugates the people. Shiva's boon grants the demon-king invulnerability against gods and beasts. Only mortal men stand a chance of defeating him, but Ravana's might is too potent for a mere man to overcome. All seems lost.\\n\\nTo save us, Vishnu took human form. Rama, prince of Ayodhya.\\n\\nAt age 16 he was already the perfect embodiment of man. Strong, humble, handsome, patient, devout; he is what mankind strives to be, yet, for all our flaws, can never reach.\\n\\nWhen a neighboring kingdom, cursed by Ravana's magic, asked for aid, Rama answered, despite the misgivings of his father. With his brother Laksharma, Rama set out and slew a horde of demons. At the palace, Rama cleansed the curse by freeing the queen from stone. The city celebrated and Rama was invited to string Shiva's bow – with the prize princess Sita's hand in marriage. Shiva's bow could not be lifted by any man, let alone strung, but Rama broke the bow in half. He and Sita wed immediately.\\n\\nReturning home, Rama was to be crown prince, but the jealousy of queen Kaikeyi forced Rama into exile, where he's remained these past fourteen years.\\n\\nYet Rama was recently seen on the field of battle. Word is, Ravana stole Rama's wife, and Rama left exile to embrace his destiny. He must defeat Ravana, free his wife, and set mankind on a path for peace, else darkness and evil will conquer all.","name":"Rama","pantheon":"Hindu","roles":["Hunter"],"title":"Seventh Avatar of Vishnu"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dart.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flurry.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/acorn-blast.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/through-the-cosmos.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/acorn-of-yggdrasil.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ratatoskr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ratatoskr.jpg","lore":"Yggdrasil, the world tree; upon those mighty boughs are held the nine realms of existence, and nests the wise Eagle. Far below, across the galaxy spanning trunk, and beneath the roots, coils Nidhogg, the deplorable serpent. In eternal, bloodless conflict are the Eagle and Serpent locked. Perhaps these two enemies would have forgotten each other long ago were they not able to trade jabs and threats across that impossible distance. Yet, there is one that takes great pleasure enabling this feud, one whose mischievous talent for insults and barbs knows no bounds. And he’s just a squirrel.\\n\\nRatatoskr, the sly messenger, has lived in the World Tree since time immemorial. Where he came from or why is truly unknown, but if there’s a way for him to stir the pot between any two gods, he’ll do it. He’s a master of gossip and coy, backhanded compliments. And yet, all the Gods come to him for news. His home on the trunk of Yggdrasil conveniently places Ratatoskr at the center of all cosmic activity.\\n\\nAs Gods from every Pantheons clash, how could Ratatoskr pass up the opportunity to instigate new rivalries? Quite simply, he cannot. Beware the squirrel.","name":"Ratatoskr","pantheon":"Norse","roles":["Assassin"],"title":"The Sly Messenger"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/prana-onslaught.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overhead-kick.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/10-hand-shadow-fist.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mystic-rush.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/chain-of-blows.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ravana.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ravana.jpg","lore":"Power does not come without sacrifice. The greater the sacrifice, the more immeasurable the power. Ravana, the Demon King of Lanka knew this. For years he worshipped, showing his devotion through isolation, prayer, and penance before the shrine of Shiva. Yet for years he was met with only silence. In his pursuit of immortality, he sacrificed his very life. He cut off his own head.\\n\\nAgony and pain met him as it regrew. He was greeted not by Death, but by rejection. Shiva the destroyer did not want him. Ravana was undaunted. Nine more times his head was offered, and on his tenth sacrifice, finally Shiva was sated.\\n\\nFor the Demon King, Shiva granted a boon. Instead of immortality, he gained invulnerability against those he viewed as threats: Gods and Demons. Ravana could not be destroyed.\\n\\nA master of combat, a genius scholar, a peerless leader, and now invincible, Ravana amassed an army of fiends and monsters to conquer the world. None could stop him. The Monkey King tried, but Ravana fought off his attacks. The Demon King’s armies conquered all, leaving Ravana to rule from a golden throne.\\n\\nVishnu, in his wisdom and grace, would not permit Ravana’s dominance. By Gods and Demons Ravana could not be harmed, but by mortals...\\n\\nThus was Vishnu reborn Rama, a mere man. Now trained as a warrior, Rama calls the Demon King to battle.\\n\\nPride scraping like a knee on stone, Ravana rallies his monstrous siblings, his conquered allies, and his formidable army to answer Rama’s taunt. And their rivalry will shake the world.","name":"Ravana","pantheon":"Hindu","roles":["Assassin"],"title":"Demon King of Lanka"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sic-em.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/crush.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sentinel.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/im-a-monster.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/quick-learner.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/scylla.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/scylla.jpg","lore":"Ancient poems warn of a narrow channel of water so treacherous that death touches all who approach. Sailors must choose to risk their ship, traveling close to the monstrous whirlpool Charybdis, or instead hug the rocky shoals where dwells a creature some say is made from the nightmares of all men.\\n\\nScylla, they call her, Horror of the Sea. No ship that dares sail in her waters goes unscathed. Those that cling to survival whisper panicked tales of enormous black tentacles tipped with slavering hound heads ravaging whole ships to splinters with pitiless precision. Though it’s her laughter, they say, that’s most horrible; child-like, delighting in blood soaked murder as men are dragged into the dark abyss.\\n\\nPoets have tried to romanticize this beast, to provide some humanity to her monstrosity. They write she was once a beautiful Naiad, wronged by a jealous priestess and transformed. Yet the old poems say she was born this way, beget by gods full of jealousy and loathing; dropped into the sea to terrorize mankind.\\n\\nWould that she had remained in the sea, but the nightmare has come ashore. Dragged by dog-headed tentacles she roams our streets, plucks us from our beds, and fills the night with disturbing laughter. Scylla has come, and not even the gods can help us.","name":"Scylla","pantheon":"Greek","roles":["Mage"],"title":"Horror of the Sea"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/deathbane.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cobras-kiss.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ambush.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/last-breath.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/catalyst.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/serqet.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/serqet.jpg","lore":"It is with fear and trepidation that man walks carefully near the serpent and scorpion. Not that these creatures could overpower him with strength or guile, but the fierce venom they carry is deadlier than any blade or arrow. Yet, for all the dread they induce, they never strike randomly or in anger. Poison of any kind is controlled and administered only to those deserving of such punishment. Serqet, Goddess of Venom sees to this.\\n\\nThough crushing strangulation and pain await those touched by her sting, Serqet is not a deity of retribution but guardianship. The wakeless dead are embalmed and preserved for all time in fluids taken from Serqet's beasts. Of the four sacred Canopic Jars which hold the internal organs of the mummified, Serqet is the watcher of one. And, though her strikes mean certain death, Serqet can cleanse poison as easily as apply it.\\n\\nA battlefield is a strange place to find this Goddess. Normally, Serqet is an invisible presence. She watches. She waits. She learns before she strikes and ensures that those she kills deserve such an end. It must be that the vanity of the Gods has pushed Serqet too far. Now all will meet death with venom in their veins.","name":"Serqet","pantheon":"Egyptian","roles":["Assassin"],"title":"Goddess of Venom"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/skewer.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spawn-of-set.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sandstorm.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/kingslayer.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/relentless.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/set.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/set.jpg","lore":"Imagine you can, if only for the briefest of moments, glimpse the future. Your spirit yearns to see all that you hold dear prosper, shining like a beacon against all the rest of creation, defiant against hardship and basking in the glow of peace and security. Imagine then, seeing the truth, a truth of an altogether different kind.\\n\\nYou see your kingdom, the divine beings who protect it and its mortal peoples, and upon looking closer, you see a rot begin to form. A weakness, fraying away at the very heart, a fundamental absence of strength that threatens to spread, yawning wide into a void that will consume all.\\n\\nWhat lengths would you go to, to prevent this from happening? What would you sacrifice, whose blood would you be willing to spill? For the god Set, he would pay any price, even the blood of his own brother, Osiris.\\n\\nSet saw the tyrannical control his brother held over the land, the hoarding of strength and power even from his own son. He looked to that son, fair Horus, starved of the means to take the reigns of command when his appointed time came, incapable of leading them into any future but darkness. Set looked upon an unworthy king, and a worse successor, and he chose to act.\\n\\nHe knew the world would seek to damn him, to decry his deeds as those of a murderer, slavering for power. But Set would endure such lies, to save his kingdom. He would seize the throne back from the unworthy and the weak, from the sinister and the corrupt, and in time, when the truth of the world mirrored the truth he desired in his heart, they would throng the streets to praise him. Set would be their deliverance, no matter the cost.","name":"Set","pantheon":"Egyptian","roles":["Assassin"],"title":"The Usurper"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/piercing-cold.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rune-of-the-hunt.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/permafrost.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/winters-grasp.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/kaldr-the-winter-wolf.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/skadi.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/skadi.jpg","lore":"Full of mirth rang the halls of Asgard. Celebrating, the Gods drank of mead and feasted on roasted beast while the corpse of their defeated foe, the Jotun Thjazi, lay cold nearby. For decades were they at odds. Now, that conflict was ended. Odin and his ilk openly boasted of their achievements, laughing and cheering while the floor ran wet with spilled spirits. \\n\\nThen, the doors swung wide, breathing icy winter wind across the hall. There she stood, spear in hand, skin, porcelain pale, clad in snow dusted furs, and eyes blue as glacier ice but smoldering with vengeful fire. Skadi, the Jotun’s daughter had come. \\n\\nTransfixed by her beauty, the gathered Gods sought to dissuade her from violence. As a symbol of honor, Odin cast the eyes of her father into the heavens to twinkle as stars for eternity. Skadi was not moved. A life for a life, she demanded. \\n\\nIt was Loki that softened her heart with humor and dance. So jovial was he that, at last, her frozen features cracked a smile. \\n\\nA wedding! Odin declared. Skadi would marry a God and so, herself become a Goddess. This would be her payment for the life of her father. Now warmed to them, Skadi agreed. Blindfolded, she was to choose her husband by only his feet. Eligible men came forth and Skadi made her choice. \\n\\nTheir marriage did not last. Niord was a God of Summer and Skadi a Goddess of Winter. After a few years, they amicably parted ways. Skadi returned to the snow-capped mountains of her youth, but without her father or husband, she soon grew lonely. Word spread of a war between the Pantheons. Odin and Loki, Niord and Ullr; these Gods were her family now, and Skadi would not lose the only family she had left.","name":"Skadi","pantheon":"Norse","roles":["Hunter"],"title":"Goddess of Winter"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/charge-prey.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tail-whip.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sickening-strike.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lurking-in-the-waters.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/blessing-of-the-nile.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/sobek.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/sobek.jpg","lore":"Hunter, guardian, destroyer, menace; the Crocodile God, Sobek, swims where the Nile takes him and owes allegiance to no one.\\n\\nSome say that Sobek was there when only the Dark Waters existed, so he helped create the world. Some say that Sobek made the Nile with his sweat and protects those that travel it if they pay him tribute, otherwise he destroys them. Some say that Sobek ushers the worthy dead down the Nile to the afterlife and aids in their rebirth, restoring sight and strength. Some say he is evil and hateful, ravaging those along the shores and terrorizing villages. Sobek, in truth, is all of these things and none.\\n\\nSobek is not a God of good or evil, of benevolence or malice, but a God of solitary neutrality, unless disturbed; a God that tends to his mighty river and performs his responsibilities to passing souls. The rest of the time, he does what he wishes. For his protection to the living and the dead, he is to be worshipped and respected. For his power, ferocity, and ruthlessness, he is to be rightfully feared.","name":"Sobek","pantheon":"Egyptian","roles":["Guardian"],"title":"God of the Nile"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/radiance.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stellar-burst.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/disapparate.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/supernova.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unstable-manifestation.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/sol.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/sol.jpg","lore":"Sol and her brother came into this world radiant, glorious beings. So enamored with them, their father arrogantly named each after a sacred heavenly body, he for the moon and she, the sun. As they grew, each child proved their namesake. Mani, of the moon, was contemplative, obedient, calm. Sol, conversely, became willful, spirited, passionate. His children were everything a father could dream, but Odin and his ilk were not pleased. For a father's hubris, Mani and Sol were punished.\\n\\nTo the sky, they were sent, each to lead the chariot that dragged the sun or the moon. At their heels were loosed the bloodthirsty sons of Fenrir. Hungry wolves, relentless in pursuit of their prey.\\n\\nResigned, Mani guided his steeds through the night, ever ahead of his hunter, but Sol did not accept her fate. Furious at the Gods, she taunts and challenges the wolf Skoll as she blazes across the sky, unleashing her spite on the only opponent she can reach.\\n\\nOdin has never shown signs of regret for his decision, but now war is upon the land. His attentions are turned. Sol, normally confined to her chariot has found a way to send her flaming essence to the battlefield. To the casual observer, the combat, the bloodshed, may all seem just a game to Sol, but she is driven by an age old grudge and a desire to be free.","name":"Sol","pantheon":"Norse","roles":["Mage"],"title":"Goddess of the Sun"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-magic-cudgel.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/masters-will.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/72-transformations.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/somersault-cloud.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/undefeated-body.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/sun-wukong.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/sun-wukong.jpg","lore":"Warrior, rebel, trickster, monk, Sun Wukong is known by many titles in the East, yet it was a Journey to the West that made him a hero.\\n\\nIn his youth, Sun Wukong gained leadership of the monkey tribes, learned secret arts and spells from a Taoist monk, and acquired the legendary Ruyi Jingu Bang from Ao Kuang, a staff that could change size according to his whim. He defied death itself by wiping his name from the Book of Life and Death, and united many of the other monster tribes who sought to ally with him, an act that garnered the attention of the Jade Emperor.\\n\\nIn an effort to better control the Monkey-King, the Jade Emperor awarded him a title, but when Sun Wukong discovered his new position was little more than “stable boy” he grew angry and declared himself “Great Sage, Equal of Heaven,” and waged war on the heavens. For this treasonous act, he was finally captured and imprisoned beneath a mountain for five centuries.\\n\\nAt long last, the humble monk Xuanzang was seeking disciples to protect him while on his legendary Journey to the West to collect the Indian Sutras. Sun Wukong gladly agreed to serve him, but the Buddha wrapped a golden circlet around the Monkey King’s head so that Xuanzang could control him. With three other disciples, they faced eighty one trials during their quest, and collected the sutras. For his service and strength, Sun Wukong was awarded Buddhahood, finally ascending to heaven and gaining immortality.\\n\\nWith an epic battle between Gods taking place, Sun Wukong’s presence is all but assured.","name":"Sun Wukong","pantheon":"Chinese","roles":["Warrior"],"title":"the Monkey King"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/storm-kata.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wind-siphon.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/jet-stream.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/typhoon.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/gathering-storm.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/susano.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/susano.jpg","lore":"Like his sister, Amaterasu, Susano was born to rule, but he was tempestuous, with a flaring anger, wicked tongue, and a penchant for destruction. Their father, Izanagi, would have none of it and decreed that Susano live in the Underworld. His mood dark at this news, Susano committed heinous acts of vandalism and murder. Acts that sent Amaterasu into shameful hiding.\\n\\nCast low, Susano descended to earth on his way to the Underworld. He carried only his Ten-Span Sword, and regret for his actions. What had his defilements achieved but to envelop the world in darkness? This was his nature, to broil like a storm, to frighten and destroy what stood in his path.\\n\\nBut a storm could also herald life.\\n\\nAt a river side, Susano ventured upon an elderly couple, weeping and cradling their young daughter. Eight children, they’d had once, but now only one remained; seven devoured by the eight-headed serpent. Susano was resolved. To atone for his crimes, to prove his father wrong, to better himself, Susano would slay this beast.\\n\\nEight traps he laid, one for each head of the creature, with eight tubs of aromatic saké as bait. Slithering forward, the Orochi spread its gruesome heads to drink from the trapped tubs. Susano cut the rope. Gates dropped. The heads were imprisoned. One by one, he chopped the eight necks, until only the wriggling tail remained. Sweeping his blade split the reptilian hide, leaving notches in his blade but revealing a brilliant sword inside: the Kusanagi-no-Tsurugi.\\n\\nTo his sister, he gave the blade. An act of atonement, but not an apology. His true nature would never change, but his intention could.\\n\\nThough seen on the battlefield of the Gods, Susano’s fight is not truly against those foes, but within himself. He is a raging summer storm, struggling to focus that destructive power at evil, and atoning when the innocent are harmed.","name":"Susano","pantheon":"Japanese","roles":["Assassin"],"title":"God of the Summer Storm"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/verdant-growth.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wisps.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/natures-grasp.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wrath-of-terra.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/natures-protection.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/sylvanus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/sylvanus.jpg","lore":"It is no coincidence the fields and forests surrounding the Mediterranean are haven to shepherds, farmers, and wildlife. They're guarded by aged Sylvanus, a benevolent spirit of nature, whose glittering eyes and easy grin match the vibrant life that grows in these lands.\\n\\nCompanion to all woodland creatures, both mundane and fantastic, Sylvanus has been seen with fawn and wolf, nymph and satyr, and even trees come to life. He protects and nurtures those that respect his domain.\\n\\nWhen the boy Cyparissus went traveling with his pet deer, Sylvanus accidently allowed wolves to hunt the peaceful animal. So stricken with grief at the loss of his pet, the child succumbed to despair and died. Wracked with guilt, Sylvanus transformed the child into the Cypress tree, whose sap weeps like the saddened child.\\n\\nOld and wise, Sylvanus views the passing of time with ease and understanding. His laughter is the wind in the leaves, his touch the sprout of flowers from the earth, and his voice the call to calm the most savage beast. He is slow to anger and slower to act, which is why his presence on the battlefield is so strange. As the war between Gods spills into the idyllic realms Sylvanus keeps, he is left with no choice but fight back.","name":"Sylvanus","pantheon":"Roman","roles":["Guardian"],"title":"Keeper of the Wild"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/force-of-nature.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/crushing-earth.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/monolith.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/earthen-fury.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/standing-stones.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/terra.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/terra.jpg","lore":"Terra Mater, quite literally the mother Earth, rests dormant beneath every living thing. Upon her flesh, trees stand like hairs, rivers weave like veins, and oceans lap against her sides. Long has she slept; since her son, the Titan Saturn, was cast down by his own son. It had all gone so wrong.\\n\\nAt the forging of creation, Terra was split from all other primordial matter to form the earth. Above her, Uranus, the sky, suspended angelically. She loved him immediately and made him her king. Their children were Titans, beings even more powerful than they. In his fear and jealousy, Uranus buried the Titans within the earth. Terra began to see the arrogance, the vanity, the hatred in her husband. Conspiring with her children, she freed them and overthrew Uranus.\\n\\nYoungest of the Titans, Saturn, ruled next. Terra could not have been more proud, but prophecies claimed Saturn would be defeated by his children, just as Uranus had. To prevent this, Saturn consumed his offspring. All but one. Jupiter escaped, and with righteous fury split Saturn open, unleashing his swallowed siblings. Violently, they defeated the Titans, Terra’s children, and claimed the world as their own.\\n\\nMournful of the children she lost, Terra slept. And ages passed.\\n\\nBut the ravages of a new war have scarred her skin. Her grandchildren, those arrogant, vain, treacherous Gods that stole the world from her son, those Gods, so reminiscent of Uranus, bleed into her bones with every battle. Now, she finally rises from her slumber. She rises to claim the throne for herself.","name":"Terra","pantheon":"Roman","roles":["Guardian"],"title":"The Earth Mother"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/death-scythe.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/scent-of-death.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/soul-reap.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hovering-death.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/harvester-of-souls.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/thanatos.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/thanatos.jpg","lore":"Inevitably, all mortals must die. They cling to life with fevered desperation, for death is a cold unknown, filled with uncertainty and bleak, everlasting finality. Some accept fate with grace, others are dragged, kicking and screaming, though in truth, no mortal would go to Hades willingly. They are reaped by the nightmarish God of Death, whose grim visage strikes strange against the gleeful satisfaction he feels at performing his work. Thanatos is the very face of death.\\n\\nYet, to Thanatos, Mortals are easy prey. Their end is preordained, harvesting them but a game to pass the eons, but a God, a being beyond the mortal coil, now there is a creature Thanatos eyes with greedy longing. He despises the immortality other Gods covet. To him, it is a perversion and defiance of his very purpose.\\n\\nBut can a God truly die? As the Heavens clash and immortal blood spills on the Earth, Thanatos hungers to find out. War is but the preamble to death, a battlefield of souls rent from their bodies, listlessly waiting to be taken by the God of Death. A war between Gods, a war of this magnitude can mean only one thing. Thanatos is about to be very, very busy.","name":"Thanatos","pantheon":"Greek","roles":["Assassin"],"title":"Hand of Death"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/deadly-aspects.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dark-omen.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/confusion.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/changeling.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/doomsayer.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/the-morrigan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/the-morrigan.jpg","lore":"Fate is an unusual thing. An unseen force predicting every action of every being. Some deities can see it, recognizing the flow of the plan. There are none, save one, that claims mastery over it, that manipulates it with such cold intent, that steers it ever toward war and the red demise of heroes. In truth, she is many Goddesses, with many names and many forms. But there is only one title. The Morrigan\\n\\nAnu, Macha, Badb. Individually, these three Goddesses were sisters, progenitors of sovereignty, war, and death. They were caretakers of their lush green Éire, champions for armored soldiers, guides for the deceased. It is unknown what bound them together. Some whispered curse, some lover’s scorn. Some dark power or darker purposes.  But now they are one.\\n\\nShe’s been seen in many shapes. The lurid seductress, the wrinkled hag, the screaming crow, and worst of all, the washer in the river. For those who witness her cleaning their bloody armor prophesies a violent end.\\n\\nSubtle and manipulative, there is no war The Morrigan did not incite. No dying breath she did not collect. Even this war, a war between Gods, must secretly be of her making. So, beware those that behold her, for The Morrigan controls your fate.","name":"The Morrigan","pantheon":"Celtic","roles":["Mage"],"title":"Phantom Queen"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mjolnirs-attunement.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tectonic-rift.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/berserker-barrage.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/anvil-of-dawn.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/warriors-madness.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/thor.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/thor.jpg","lore":"Thor, as famous as he is bold, is God of the thundering sky. Yet his hammer, Mjolnir is nearly as famous as he is, and Thor will not be parted from it.\\n\\nOdin, the All-Father, bore many children, but none as well known nor as mighty as Thor, who had the strength to move mountains and the power to call lightning from the sky. Despite these incredible gifts, Thor’s enemies were cunning, bloodthirsty, and numerous. The Frost Giants constantly threatened to invade Asgard requiring every ounce of Thor’s near limitless strength just to keep them at bay. Had the tide truly turned, Asgard might have been destroyed, but a simple prank played by the treacherous Loki ended with the creation of Mjolnir, the legendary hammer, and with it, Thor utterly crushed the Frost Giants.\\n\\nSif, Thor’s wife, had hair like rays of sun through a cloudy sky, and Loki, being covetous, secretly sheared it off while she slept. Mad with fury, Thor demanded Loki fix this. So, Loki went to the dwarves of Ivaldi who forged a golden crown that would grow equally golden hair, a spear that never missed its mark, and a ship that would never sink. Proud of his treasures, Loki returned to Thor and the other Gods, gave the crown to Sif, then bragged that no greater items could be forged.\\n\\nThe dwarf Brokk took offense to this and claimed that he and his brother could do better. Loki bet his head they could not. So, Brokk and his brother forged three items, a ring that made a duplicate every nine days, a golden pig that could fly and swim, and the hammer, Mjolnir, with the power to shatter mountains. As each item was forged, Brokk was bitten fiercely by a fly, yet only on the third did he flinch, causing the short handle on the hammer. When they were done, the dwarves took their artifacts before the Gods and decried Loki’s fly disguise. All the Gods agreed that Brokk and his brother had forged greater items. Loki, ever cunning, declared his neck was not part of the bargain, denying them his head.\\n\\nMjolnir went to Thor to battle the Frost Giants. Proud and mighty, Thor beat back the evil horde and continues to defend Asgard to this day. With Mjolnir in hand, Thor is an unstoppable force that even other Gods would do well to avoid.","name":"Thor","pantheon":"Norse","roles":["Assassin"],"title":"God of Thunder"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hieroglyphic-assault.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/evade-and-punish.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/glyph-of-pain.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/final-judgement.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dead-reckoning.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/thoth.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/thoth.jpg","lore":"Legends tell of a tome of magic, wherein all the secrets of the world can be found, where the spells to change the fabric of reality are written, and where the knowledge to master death is inscribed. The legends understate reality. So powerful is this book that the mere flipping of pages sets Gods on edge.\\n\\nThis lexicon of legerdemain was no product of happenstance. Every incantation, every inflection was carefully crafted by a God beyond comprehension, of wisdom so transcendent, he willed himself into being. He is Thoth, the Scribe of Secrets.\\n\\nThree great battles there have been, and at each, Thoth was present, aiding the forces of order to triumph over chaos. When Ra faced the world serpent Apep for the final time, Thoth’s spells shielded Ra against the reptile. When Osiris was dismembered by his brother Set, Thoth taught Eset the incantations to reassemble him. And when Horus, the child of Eset and Osiris, battled Set once again for control of the Kingdom, Thoth’s rituals cleansed the young man of Set’s vilest poisons.\\n\\nAll of the secrets, the power, the wisdom of the universe, Thoth has placed into this book. He is the guardian of this knowledge, invoking it only to save the world, to keep it from descending into disorder.\\n\\nBut now, the world is falling into chaos. God battles God. The heavens quake, the earth shudders, the seas boil, and mortals cry out. If ever there was a time for Thoth to break the binding of his book, it is now. This world is unprepared for the secrets he will reveal.","name":"Thoth","pantheon":"Egyptian","roles":["Mage"],"title":"Arbiter of the Damned"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/primordial-onslaught.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ruination.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/grounding-dive.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/children-of-creation.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/death-begets-life.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/tiamat.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/tiamat.jpg","lore":"Tiamat is the first. The begetter of all life. The mother of creation. When the heavens did not yet exist, nor the earth below, she was there. For aeons, she coiled silent and sleeping in the cosmic abyss, until she met Apsu, the god of fresh waters. Together, they drew up the primeval waters of creation, and from those waters came all things.\\n\\nHer eldest children gave shape to the Heavens and the Earth, and created the younger deities. But these younger gods were treacherous creatures – duplicitous and cunning. They trapped Apsu in his temple, angering Tiamat. She fashioned monstrous children to punish the traitorous gods. Harried from their palaces by Tiamat’s armies, they were forced to seek the protection of Marduk, mightiest of the young gods.\\n\\nMarduk forced the other gods to acknowledge him as their king, and then went to war with Tiamat. After a great battle that rocked the heavens, Marduk managed to defeat Tiamat and cast her back into the cosmic abyss from which she had been born. Locked out of the world she had given birth to, Tiamat returned to her slumber, deaf to the cries of her children as Marduk and the other gods hunted them almost to extinction.\\n\\nBut now the wheel of creation has turned once more, and the primeval waters recede. Tiamat has surfaced from her enforced sleep and risen from the abyss to find the world – her world – much changed. Worse, it is infested with lesser gods. Not those she knew, perhaps, but the same even so. Like all lesser gods, they claim ownership over the Heavens and the Earth – of that which does not belong to them. They believe themselves to be all powerful.\\n\\nBut Tiamat will show them what true power really is.","name":"Tiamat","pantheon":"Babylonian","roles":["Mage"],"title":"Goddess of the Salt Sea"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dark-moon-shuriken.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/kusarigama.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/silver-moon-caltrops.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/piercing-moonlight.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shingetsu-\u0026-mangetsu.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/tsukuyomi.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/tsukuyomi.jpg","lore":"Might makes right. To impose order, to bend the world to your will – these are the marks of a true leader. Only a true leader has the strength of will and the force of arms to make his enemies bow before him. Only a true leader deserves the respect and adulation of his followers.\\n\\nThese are the guiding principles of Tsukuyomi’s existence. Proud, but violent, he is the God of the Moon and the Night. Wielding his twin tonfa, Shingetsu and Mangetsu, he overcomes his enemies with effortless skill and a mocking laugh, forcing them to bow before him – for what good is victory without an audience to see it?\\n\\nHe is the opposite in every way of his sibling, Amaterasu. Where she is light, he is dark. Where she is kind, he is cruel. But in his cruelty there is purpose. A true leader cannot show weakness, cannot brook insult – even one unintentionally given.\\n\\nSuch was the reason that Tsukuyomi struck off the head of the goddess of plenty, Uke Mochi. For her manner offended him, and offense must be answered as swiftly and surely as possible, lest weakness be revealed. Order must be maintained, whatever the cost.\\n\\nAmaterasu did not understand. She cast Tsukuyomi from her sight, forever exiling him from the heavens. The day would be hers, and the night his. Another insult, but one Tsukuyomi has borne in silence...until now.\\n\\nFor now, the Great Dreamer has awakened and cast a shroud of madness across the world and its peoples. The order of all things breaks down, and weakling gods like Amaterasu falter.\\n\\nBut a true leader sees opportunity in chaos.\\n\\nThe time of Amaterasu and her followers is done. Tsukuyomi seeks to impose a new order upon things – one more to his liking. A long night falls across the world.\\n\\nAnd now, a new moon rises...","name":"Tsukuyomi","pantheon":"Japanese","roles":["Assassin"],"title":"God of the Moon"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fearless.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/power-cleave.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/change-stance.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lawbringer.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/unyielding.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/tyr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/tyr.jpg","lore":"Tyr. The embodiment of mankind’s impossible ideals. Man is a malleable creature, but a God is stone, shaped only by the harsh weather of expectation. And none have a greater burden of expectation than Tyr, for he is Courage. He is Honor. He is Justice.\\n\\nCourage is not the absence of fear, but the will to face the frightening.\\n\\nFenrir, the mighty wolf, was foretold to wreak such devastation on the Gods that they sought to bind him. Tyr, clothed in courage, brought the beast to their prison, where the Gods prepared shackles.\\n\\nHonor is not a stubborn oath, but the integrity to uphold what is right, even when it is not easy.\\n\\nUnder the guise of a test of strength, twice the Gods bound Fenrir, and twice he broke free. On the third attempt, Fenrir sensed a trick and demanded one of the Gods place their hand into his mouth. If the binding proved magical, Fenrir would take the hand. Tyr agreed.\\n\\nJustice is not adherence to the law, but a code of fairness and morality.\\n\\nBound by the mystical ribbon, Fenrir devoured Tyr’s hand. It was the price to be paid. And Tyr paid it willingly. Even Fenrir deserved justice.\\n\\nOne handed, Tyr is worshipped as a pinnacle of righteousness, called upon for valor in battle, balance in law, and the fortitude to face the impossible. As the cloud of war blackens the world, and fear grips the people, Tyr is stooped by the weight of expectation. With blade in hand, he takes the field. For he is Courage. He is Honor. He is Justice.","name":"Tyr","pantheon":"Norse","roles":["Warrior"],"title":"the Lawgiver"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bladed-arrow.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/expose-weakness.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hail-of-arrows.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wield-axes.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/weapon-master.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ullr.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ullr.jpg","lore":"Amongst the snow-capped forests of the frigid north resides the hunter-God of Glory, Ullr. Reserved, secretive, Ullr does not represent the tankard downing, boast bellowing contemporaries of the Norse Pantheon, but pays respectful tribute to glory in all its forms.\\n\\nGlory is in the silence of snowfall, in the honorable victory earned from single combat, in the perfect curve of a yew bow firing an arrow true. Dotted across the lands of the Faithful, shrines to Ullr can be found in remote, secluded hideaways. It is there that glory is found in the sanctity of a vow, once sworn, never broken, and bound by a ring, no matter how crude, then buried in the earth to weather the ages of time.\\n\\nThough rarely spoken of, he is highly regarded, even among the Gods, for it is Ullr, not one of Odin’s sons that tends the throne of Asgard while the All Father is away. Other Gods might use the opportunity to abuse the power, but Ullr’s rule is merely an extension thereof. So much so that only the innermost circle even know that Odin is gone.\\n\\nAll the more noticeable is it, then, that Ullr has abandoned this post to join the fray. Early on did Odin take the field of battle, leaving Ullr to manage the kingdom. So great a threat must this war be as to endanger the very survival of Asgard. Whatever the reason, Ullr comes to preserve glory, which, for him, may be the whole world.","name":"Ullr","pantheon":"Norse","roles":["Hunter"],"title":"The Glorious One"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/clear-the-path.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/armored-umbrella.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/umbrellarang.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/colossal-fury.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sleeping-giant.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/vamana.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/vamana.jpg","lore":"Though small of stature, Vamana, the Fifth Avatar of Vishnu, should never be underestimated. His harsh lessons in humility have shamed even the proudest of kings.\\n\\nThe demon king, Bali, was fair and righteous, yet for all his virtues, Bali was extremely proud and driven by fierce ambition. After conquering the Underworld and all the Earth, Bali managed to wrest the Heavens from the God Indra. Unable to reclaim his seat, Indra implored Vishnu for aid, and so Vishnu took the form of a small mortal man, a priest named Vamana.\\n\\nIn his splendid palace, Bali was giving gifts to the pious. Vishnu, disguised as the monk Vamana and carrying a wooden umbrella, requested only as much land as he could cover in three steps. Bali offered Vamana an island but Vamana stuck to his request, which Bali granted against the wishes of his advisor. Immediately, Vamana grew to cosmic proportions, crashing through the ceiling of the palace and filling the sky. With one colossal step, he engulfed all the Earth and the Underworld. With a second step, he consumed the heavens. Now, with everything under his two units, Vamana had nowhere to place his third step. He challenged Bali to go back on his word or offer somewhere else for him to step. Bali’s demon army surged forth, but the demon king held them back. Bowing in humility, Bali offered his head as the third step. Vamana sends Bali to the underworld but, in recognizing Bali’s benevolence, shows mercy by granting him sovereignty over it in appreciation of Bali’s sacrifice.\\n\\nVishnu returned control of the Heavens to Indra and left his Avatar behind, but he also left behind a valuable lesson. Even the mightiest and most arrogant of kings can be humbled by the smallest of men.","name":"Vamana","pantheon":"Hindu","roles":["Warrior"],"title":"Fifth Avatar of Vishnu"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/backfire.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/inferno-cannon.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/magma-bomb.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/earthshaker.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/master-craftsman.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/vulcan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/vulcan.jpg","lore":"When the Gods of Rome ride chariots across the sky, it is Vulcan that made them. When they reach for weapons to wield in battle, it is V
