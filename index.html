Oz"><h2>Ah Muzen Cab</h2><p>God of Bees</p><p>Maya</p></div></div></div></div></div><select class="select_select__2oa3t"><option selected="" value="Any">Any</option><option value="Warrior">Warrior</option><option value="Mage">Mage</option><option value="Hunter">Hunter</option><option value="Assassin">Assassin</option><option value="Guardian">Guardian</option></select></div><div><div class="card_wrapper__2juE0"><div class="card_card__2VXnb "><div class="card_front__q1IDC"><img class="Home_image__vm46b" src="https://hphothong.github.io/smite/hexagons.svg" alt="Hexagon Pattern SVG"/></div><div class="card_back__2eisx"><div class="card_background__PMKa2" style="background-image:url(https://webcdn.hirezstudios.com/smite/god-cards/ah-puch.jpg)"><div class="Home_content__2fqOz"><h2>Ah Puch</h2><p>Horrific God of Decay</p><p>Maya</p></div></div></div></div></div><select class="select_select__2oa3t"><option selected="" value="Any">Any</option><option value="Warrior">Warrior</option><option value="Mage">Mage</option><option value="Hunter">Hunter</option><option value="Assassin">Assassin</option><option value="Guardian">Guardian</option></select></div><div><div class="card_wrapper__2juE0"><div class="card_card__2VXnb "><div class="card_front__q1IDC"><img class="Home_image__vm46b" src="https://hphothong.github.io/smite/hexagons.svg" alt="Hexagon Pattern SVG"/></div><div class="card_back__2eisx"><div class="card_background__PMKa2" style="background-image:url(https://webcdn.hirezstudios.com/smite/god-cards/amaterasu.jpg)"><div class="Home_content__2fqOz"><h2>Amaterasu</h2><p>The Shining Light</p><p>Japanese</p></div></div></div></div></div><select class="select_select__2oa3t"><option selected="" value="Any">Any</option><option value="Warrior">Warrior</option><option value="Mage">Mage</option><option value="Hunter">Hunter</option><option value="Assassin">Assassin</option><option value="Guardian">Guardian</option></select></div></div><div class="Home_random__3J4Cq"><button type="button">Randomize</button></div></div></main><footer class="layout_footer__NfVyU"><div class="layout_content__15tm0">Hayden Phothong © 2021</div></footer></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"smiteGods":[{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shield-of-achilles.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/radiant-glory.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/combat-dodge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fatal-strike.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/gift-of-the-gods.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/achilles.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/achilles.jpg","lore":"King Agamemnon brought his fury to bear against gilded Troy, for Prince Paris had stolen his Helen, his wife, whose beauty rivaled that of Athena and Aphrodite. To famed Achilles, invincible warrior, the king gave command of a thousand ships.\\n\\nAcross stormy seas and salted beach, soldiers sieged the city. Arrow and stone, blade and barb bounced from Achilles’ skin. Bathed as a babe in the River Styx by his Nereid mother, his hide was hardened, imperviously made. Through every charge, every death-defying battle, Achilles was at the fore. Troy hung poised to crumble.\\n\\nUntil Agamemnon gave slight to the mighty myrmidon. In grave offense, Achilles pulled his forces from the field. Hector, boldest, bravest, eldest of the Trojan princes seized the chance to push the Greeks to the sea. Water’s reflection mirrored scorching sails as Hector fired their ships. All seemed lost until Achilles rose to meet him. Fierce and fast the two titans fought, but Hector’s spear felled Achilles fair. Though Patroclus, it was, in the armor of Achilles, not Achilles who lay dead.\\n\\nWrathful at the loss of his faithful lover, Achilles donned armor newly-made and challenged Hector alone. Spear and blade and amor rang, but Achilles could not be harmed. Hector, prince of Troy, died in battle that day.\\n\\nParis, brother lost, tearful-eyed, let arrow loose, guided by divine envy. For there were Gods that could not suffer Achilles to survive. Straight and true the arrow flew and harpooned Achilles’ heel, where his mother held him when submerged. The wound was deep, his weakness found, Achilles met his end.\\n\\nA decade thence, from Hades’ depths, Achilles has been drawn. Armored now, upon the heel, revenge his only aim. For envious Gods stole from him his glory and his life. Now they tremble at the wrath of the man who cannot be harmed.","name":"Achilles","pantheon":"Greek","roles":["Warrior"],"title":"Hero of the Trojan War"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/noxious-fumes.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flame-wave.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/path-of-flames.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rain-fire.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/combustion.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/agni.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/agni.jpg","lore":"There are few elements as destructive or as purifying as fire. Agni, God of Fire, is the embodiment of both of these qualities, with a head for each.\\n\\nThough the source of his origin warrants debate - for there are many tales of his parentage ranging from two simple sticks rubbed together, to the cosmic energy that made all things at the beginning of time - Agni is a pivotal and important God with many duties to the Pantheon. He is the twin brother to Indra, God of the Heavens and Rains and chief among warriors. Conversely, Agni is chief among priests, acting as messenger between mortals and Gods. Every Hindu ritual and prayer is performed in front of a fire of some kind, so Agni carries the words and sacrifices, traveling between the Earth and the Heavens. He is welcome in every home and every hearth and much beloved by the Faithful.\\n\\nThrough his flames, Agni provides heat and light, but also cleanses impurities. Smoke from his pyres create the air and hold the Heavens aloft. The sun, a source of fire itself, brings life-giving energy to the world, and his lightning streaks the sky during storms.\\n\\nFor all his kindness and service, Agni has two faces. One is the face of kindness and purity, turned towards the people and Gods. His other face, grim and resolute, guides the God of Fire, to play his role in the cosmic cycle of creation and destruction, to burn and blacken all the atrocities of the world to ash.","name":"Agni","pantheon":"Hindu","roles":["Mage"],"title":"God of Fire"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hive.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/swarm.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/honey.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stinger.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bees.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ah-muzen-cab.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ah-muzen-cab.jpg","lore":"It is said that history is written by the victors, but what happens when the victors say nothing? Everything that came before would be lost. Events, mythology, even identity. The victors – the survivors – could become anyone. Even Gods. Ah Muzen Cab is suspiciously devoid of a past, but the God of Bees enjoys the privileges of worship and ceremony. Privileges that, perhaps, he stole.\\n\\nLong ago, the sky was propped above the land by four beings, the Bacab. They endured their task without complaint, and for their service, were honored by the Mudmen beneath. In truth, the Bacab were prisoners, shackled by duty. Then, a great flood consumed the earth. Seizing their chance, the Bacab fled and the sky crashed into the rising sea. Into that terrible storm they vanished, never to be seen again.\\n\\nAs the seas retreated, new Bacab stepped in to hold the sky aloft. The land reemerged, and from it mankind was born. Gods appeared; patrons of the sustaining forces of life, like agriculture and fertility. And the bee, creator of honey, used to sweeten food, as medicine for the sick, and to produce mead for rituals, was revered, and Ah Muzen Cab arrived, as if from nowhere, as their God.\\n\\nNow, as the greatest war between the heavens clashes on earth, what will remain when the dust has settled? Who will be the victor that writes history? If Ah Muzen Cab was, indeed, one of the original four Bacab, he survived the end of the world once and became a God. What power will he seize this time when the new world is made?","name":"Ah Muzen Cab","pantheon":"Maya","roles":["Hunter"],"title":"God of Bees"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/undead-surge.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/corpse-explosion.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fleeting-breath.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/empty-the-crypts.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hollow-ground.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ah-puch.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ah-puch.jpg","lore":"Buried beneath the crust of the world descends the cruel hells of torment. The topmost of which are realms of torture and vile inhumanities, home to denizens of darkness and malice. Yet, further into the black below, at the inkiest recesses can be found the horrific ninth hell. Here dwells a deity of true evil, gloating over each corpse he’s claimed with macabre glee, and relishing the moment more of these lesser souls are his. He is Ah Puch, the mightiest lord of the ninth hell.\\n\\nWhen night falls, Ah Puch roams the land, crowned by a wreath of human eyes, gruesome skull face bared for all to witness, accompanied by the shriek of ghostly owls. All that live are his for the taking. If Ah Puch finds a human in the night, he kills and drags the unfortunate into endless oblivion. Only those already wracked by his servants, those caught in gut-wrenching wailing, moans of agony, and fits of mania are safe from his touch.\\n\\nHide now, all men and Gods, for the age of eternal night has come. Ah Puch will reap anything that lives. There is great vacancy left in the nine hells, and the Horrific God of Decay wishes only to fill it.","name":"Ah Puch","pantheon":"Maya","roles":["Mage"],"title":"Horrific God of Decay"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/divine-presence.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heavenly-reflection.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/glorious-charge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dazzling-offensive.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/illuminating-strike.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/amaterasu.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/amaterasu.jpg","lore":"As the first rays of dawn cross the horizon, before all else they touch the land of the rising sun. A realm of islands painted with the careful brush strokes of its deities. That morning light, which brings warmth and life is Amaterasu, the benevolent Goddess of the sun. Universally, she is adored. \\n\\nLess so are her brothers, namely Susano-o, bringer of storms, whose jealousy of his sister’s popularity drove him to burn her golden rice fields and shatter the sacred looms of her people. Grief stricken at the destruction, Amaterasu sealed herself inside a deep cavern. Her people suffered and the realm fell into crushing darkness. \\n\\nFor an unknown time, she stayed there, hidden away from the atrocities of the world. Until, one day, came a thumping from outside. At first, she tried to ignore it, but curiosity called. Moving aside the great stone sealing the cavern, she peered cautiously out, only to stare into a polished bronze mirror. Blinded by her own reflection, Amaterasu was forced to creep further out to find the source of the sound. Hands grabbed her from either side and pulled her free of the cave. Gathered around were hundreds of friends and loved ones. Atop a wide tub danced Usume, Goddess of Mirth, creating the erratic drumming to the joy of all. Amaterasu smiled and light came back to the world. \\n\\nSeeing all those that depended on her, all those that loved her, Amaterasu vowed never again to hide away from calamity. She would, instead, face it, just as the dawn rises each new day.","name":"Amaterasu","pantheon":"Japanese","roles":["Warrior"],"title":"The Shining Light"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shifting-sands.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/impale.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/disperse.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/desert-fury.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/enfeeble.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/anhur.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/anhur.jpg","lore":"Anhur, the lion-headed Egyptian God of war, slays his enemies with spear and guile. Weapons equally as sharp!\\n\\nAs a son of Ra, Anhur, and his sister Bastet, rode in the golden barge their father sailed across the sky each day. They protected the ship at dawn and dusk from the world serpent, Apep, who lurked at the horizon. Courageous, formidable, and above all, intelligent, Anhur defended the vessel with his spear and wits, outsmarting and distracting the serpent until feral Bastet delivered a killing blow.  With Apep gone, Ra became Pharaoh, Bastet, the Goddess of Cats and Women, and Anhur donned the mantle of the God of War.  This is how he became known as the Slayer of Enemies.\\n\\nAs time went on, another feline Goddess, Menhet, ran away from the Pantheon, spurning Ra. Anhur vowed to bring her back from the distant lands of Nubia to appease his father, but when he finally caught up with Menhet, he was enraptured and fell in love. He tied a rope to her neck and led her home, where he requested Menhet become his wife, a boon Ra happily granted.\\n\\nFor Egyptians, warfare is more than bloody battle, it's a means to break the chains of tyranny. Anhur can be found at the head of any charge, crushing corruption and leading the people to freedom. While his spear is deadly, Anhur is cunning and clever, able to outmaneuver opponents in ways they least expect.","name":"Anhur","pantheon":"Egyptian","roles":["Hunter"],"title":"Slayer of Enemies"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/plague-of-locusts.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mummify.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/grasping-hands.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/death-gaze.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sorrow.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/anubis.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/anubis.jpg","lore":"Jackal-headed Anubis holds the ultimate judgment over the dead, measuring every heart against the weight of Truth.\\n\\nNephthys, wife of Set - the God of Darkness, desired a child, yet her husband was infertile, so Nephthys disguised herself as Eset, the wife of Set’s brother Osiris, and seduced him. From that union, Anubis was born. Osiris cared for Anubis as his own, but when Osiris was murdered by his evil brother, Set, Anubis embalmed his adopted father and mummified the corpse so he would not rot. This preservation passed down to the Faithful, for if it was good enough for the Gods, it was good enough for man.\\n\\nNone enter the abyss of the Underworld without first being tested by Anubis. When corpses are preserved, he is the embalmer. When time for judgment comes, he is the final arbiter. In his realm, he keeps legendary weighing scales. On one side, the massive weight of Ma’at – truth and order. On the other side, he places the heart of the deceased. Should the weight of Ma’at prove infinitely heavier than that of the heart, Anubis casts the soul deep into the darkness of the Underworld, where it is forgotten, never to be reborn.","name":"Anubis","pantheon":"Egyptian","roles":["Mage"],"title":"God of the Dead"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/water-illusion.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dragon-call.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wild-storm.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/king-of-the-eastern-seas.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dragon-kings-sword.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ao-kuang.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ao-kuang.jpg","lore":"Regal, powerful, the Dragon-God of the Eastern Sea commands storms and tides with the flick of a claw, yet he seethes with rage for past humiliations.\\n\\nAs one of four Dragon-Gods, Ao Kuang demands tribute from those along the Eastern shores. For their worship, tides remain calm, rivers contained, and rainfall for crops plentiful. It was not always like this, however. Long ago, Ao Kuang grew greedy and expected greater sacrifices. When they were not given, he sent floods, tidal waves, and devastating storms, striking so much fear into the people they dared not speak of this violence to the Jade Emperor. Ao Kuang enjoyed his total control.\\n\\nThen came Sun Wukong to his undersea palace seeking a weapon for his famous journey to the West. Despite the offer of other weapons, Sun Wukong took the Ruyi Jingu Bang, an immense pillar that aided in controlling the tides. It was believed none could even lift it, but Sun Wukong spun it with ease. As if this were not humiliating enough, Sun Wukong demanded other gifts of armor, shoes, and helm, all of which Ao Kuang was forced to supply.\\n\\nNext, the demigod boy Nezha, playing in a stream, inadvertently shook Ao Kuang’s palace. Annoyed, the Dragon-God set forth his favorite scout to kill the child, but Nezha defended himself and the scout was slain. Furious, Ao Kuang ordered his third son to destroy Nezha, yet Nehza slew him as well. Completely outraged, Ao Kuang went to Nezha’s father and threatened to take the issue before the Jade Emperor, but Nezha tackled the Dragon-King and forced him to submit.\\n\\nSuch repeated shame and humiliation have both humbled Ao Kuang and tempered his fury to steely resolve. Long has he awaited his chance to rise again and exert dominance as a great Dragon-God of the Sea.","name":"Ao Kuang","pantheon":"Chinese","roles":["Mage"],"title":"Dragon King of the Eastern Seas"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/kiss.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/back-off.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/love-birds.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/undying-love.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/center-of-attention.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/aphrodite.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/aphrodite.jpg","lore":"There are too few words to describe the radiance, the magnificence, the inequitable glory of Aphrodite, Goddess of Beauty. So wondrous is she to behold that one look can inspire tears, desire, jealousy, and love. Yet, beneath her flawless exterior resides a heart burdened with insecurity.\\n\\nInattentive and hideous to look upon, her husband, Hephaestus, unknowingly leaves Aphrodite feeling lonely and worthless. She finds consolation in the arms of other men such as Ares, or validation by competing in any contest of beauty she encounters.\\n\\nAt a wedding attended by all the Gods, a golden apple appeared, inscribed with the words \"to the fairest.\" Immediately Aphrodite, her mother Hera, and sister Athena quarreled over it. Zeus elected Paris, Prince of Troy, to choose a victor. In exchange for being named the fairest, Aphrodite offered any woman in the world as his wife, so Paris agreed. However, he chose Helen as his wife, and their love began the catastrophic Trojan War.\\n\\nNow, a new war brews, but this one between Gods, not men. While the battlefield is no place for the fairest of all, Aphrodite recalls the destruction between the Greeks and Trojans. Perhaps, this time, her beauty can be used to stop a war instead of start one. Perhaps, this time, she will discover the beauty within.","name":"Aphrodite","pantheon":"Greek","roles":["Mage"],"title":"Goddess of Beauty"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/so-beautiful.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/serenade.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-moves.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/across-the-sky.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/audacity.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/apollo.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/apollo.jpg","lore":"There are none without admiration for Apollo, God of Music. He is brash, cavalier, and dauntless, with the power to bring hope to the hopeless and change the course of battle with a single arrow. Voices of soldiers, mothers, kings and emperors, even Gods rise in glorious melody in honor of him; and he, basking in their adoration, shines victoriously.\\n\\nThough Hera, Queen of Gods, challenged his very birth, sending the great serpent Pylos to slay Apollo, his twin sister Artemis, and their mother Leto, not even she could deny him victory. Merely four days old, Apollo, gifted with a legendary bow, slew the Gaia Serpent and defied Hera.\\n\\nIn his humble youth, Apollo was a cattle herder. The trickster God Hermes stole Apollo’s charges and led them to a nearby cave. From the shell of a tortoise and the body of a cow, he crafted the first Lyre. Apollo finally caught up with Hermes, saw the instrument, and simply had to have it, trading the rest of his cattle to Hermes for it. Years later, Hermes would send his son, Pan, to challenge Apollo in a contest of musical prowess, but Apollo soundly defeated the satyr with dexterous mastery of the Lyre.\\n\\nAs Apollo grew into his rightful place among the Gods, his victories mounted, and the songs of the Faithful were sung more and more in his name. Now, they raise their voices for Apollo to take the field as Gods clash. Never one to deny his adoring public, Apollo prepares for one last show.","name":"Apollo","pantheon":"Greek","roles":["Hunter"],"title":"God of Music"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/venomous-bite.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/cocoon.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/web.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/night-crawler.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/predator.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/arachne.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/arachne.jpg","lore":"Once, a beautiful and talented weaver of cloth and fabric, a single prideful mistake made a monster of Arachne for all time.\\n\\nWith loom and thread, there were none more skilled than the mortal Arachne. Viewers traveled leagues just to see her art. So wondrous and majestic were her tapestries, it was said the spinner must have been instructed by the patron Goddess of Weavers herself, Athena. To this comparison, Arachne proudly scoffed, claiming not even the Gods rivaled her talent at weaving.\\n\\nWhen Athena heard this, disguised as a crone, she visited Arachne and encouraged her to show proper respect to the Gods. Arachne dismissed the old woman and issued a challenge that no God, not even Athena, could weave better than she. Furious, Athena revealed herself and accepted the challenge.\\n\\nThey both set to the loom with fervor. Athena wove a glorious tapestry depicting her battle with Poseidon over the city of Athens. Her detail and imagery were exquisite. Yet Arachne’s weavings depicted Zeus in his many infidelities with mortals. So flawless, so lifelike was her artistry, not even Athena could refute the skill, nor could she contain her anger at such a sleight. Violently, she tore Arachne’s tapestry and pressed a finger to Arachne’s forehead. Twisting in anguish, Arachne fell to the ground as additional legs grew from her body, screaming as she transformed into the first spider.\\n\\nIt was an act of anger and pity, a lesson and a curse, for spiders are the greatest of weavers, and Arachne, in particular, was to weave for all time, but none could doubt the consequence for Arachne’s pride. Still, within her twisted heart, Arachne never forgave Athena, consumed by a dark hatred that can be sated only by the destruction of the Gods.","name":"Arachne","pantheon":"Greek","roles":["Assassin"],"title":"the Weaver"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shackles.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bolster-defenses.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/searing-flesh.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/no-escape.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/blessed-presence.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ares.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ares.jpg","lore":"Feared by his enemies, reviled by his father, adored by the Goddess of Beauty, and worshipped by warriors, Ares, a tortured and lonely soul, is the bloodthirsty Greek God of War.\\n\\nAres is not loved by the people. He represents everything they fear and despise: war, strife, chaos, and murder. It’s said that the sky darkens when Ares takes the field. That he rides to battle on a chariot drawn by fire-breathing steeds and delights only in the clash of battle and smell of bloodshed.\\n\\nAres is not loved by his father. Zeus has many sons, but only two with his wife Hera. However, the thunder God has long suspected Hera of having an affair that led to the birth of Ares, perhaps as revenge for all of Zeus’ infidelity. For this, Zeus is disgusted by him.\\n\\nAres is not loved by his sister. Athena and Ares are both Gods of War. Where Ares represents violence, force, and slaughter, Athena is the embodiment of intelligence, strategy, and leadership. Ares is quick to act and leave a bloody trail. Athena is thoughtful and careful with lives. Often they have been on the opposite sides, most notably at the Battle of Troy, where Athena viciously wounded him and forced Ares to retreat.\\n\\nAres is the lover of the Goddess of Beauty. Though Aphrodite is married to Ares’ brother, Hephaestus, Ares takes what he wants, and Aphrodite gives in willingly. Their union created offspring almost as terrible as Ares himself: Phobos and Deimos, Fear and Terror.\\n\\nAres is loved only by the Spartans, who revere the God for his masculinity, his merciless warrior spirit, and tenacity against all odds. The Spartans, however, know the unpredictable fury of their patron, and bind his statues in chains. This is, in part, to prevent Ares’ spirit of victory from escaping Sparta, and a vain effort to keep the God of War contained.","name":"Ares","pantheon":"Greek","roles":["Guardian"],"title":"God of War"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/transgressors-fate.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vengeful-assault.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/suppress-the-insolent.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/calydonian-boar.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/still-target.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/artemis.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/artemis.jpg","lore":"Armed with a magical bow, Artemis is the unrivaled Goddess of the Hunt!\\n\\nDaughter of Zeus and Leta, Artemis and her twin brother Apollo are products of Zeus’ infidelity to his wife Hera. Insulted, Hera cursed Leta while she was pregnant, forbidding her to give birth on land or sea. Fortunately, she found an island that did not touch the ocean floor, so it was neither land nor sea, and thus bore her children. Artemis was born first, then miraculously aided as midwife in the birthing of her brother.\\n\\nArtemis spent her childhood in the hills and forests, training with her bow and hunting beasts. As she grew older and more beautiful, she also grew proud and ruthless when slighted or dishonored, especially against those that claimed to be better hunters than she. Adonis boasted this very thing and Artemis sent a wild boar to skewer him. The twin demigods Otos and Ephialtes, who could not be killed except by each other, threatened to kidnap Artemis and force her to marry one of them, but were tricked when Artemis, appearing as a doe, dashed between them. As they thrust with their spears they impaled each other. Finally, Actaeon, after peeping at Artemis while she bathed, was transformed into a stag and devoured by his own hunting dogs. Such is the wrath of Artemis.\\n\\nHer name is invoked by hunters seeking prey and by midwives during childbirth. Sacrifices are made in her name before a new military campaign. Adolescent girls are sent to her shrine to serve for one year. Beautiful, deadly, and chaste, Artemis is a focused woman and a fearsome warrior.","name":"Artemis","pantheon":"Greek","roles":["Hunter"],"title":"Goddess of the Hunt"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/energy-surge.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/entangling-vines.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/life-tap.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shapeshift.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/decompose.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/artio.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/artio.jpg","lore":"Ice melts in cascading waterfalls from jagged mountain peaks, pouring into rivers roaring white to the cold sea. Straightening slowly, like aged men, trees and fauna of the underbrush, now free of snow-weight, reach for the sun. It is spring; the world awakens from darkness and death to grow green again. Her hibernation ends. Coat wet with fresh rain, Artio, Goddess-Bear, roars into the chill morning air.\\n\\nShe is guardian of the cycle. Not the passage of time, but the balance of things. There is no spring without winter, no death without life, no darkness without light, no goodness without evil. Nature declares these opposites into law and Artio is the enforcer.\\n\\nAmong the ursine she runs, sometimes in the shape of a woman, lithe and wild, sometimes as a bear, brown and fierce. Nowhere in the forest do there stand shrines in her name, for Artio is less worshipped and more respected. Perhaps, instead, she looms overhead, a constant presence in the twinkle of the stars, a connection of glistening light; the constellation Ursa Major.\\n\\nAnd now there is war. None could know peace without war, victory without defeat, glory without failure. Artio must join those that fight if only to enforce the cycle of things. Nothing and no one defies the laws of nature like a God.","name":"Artio","pantheon":"Celtic","roles":["Guardian"],"title":"The Bear Goddess"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/preemptive-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/confound.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shield-wall.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/defender-of-olympus.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/reach.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/athena.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/athena.jpg","lore":"In war, there are two kinds of soldiers: those that fight for blood, and those that fight for honor. The first crave the clash of steel and smell of slaughter, the latter know the wisdom of justice, the kindness of mercy, and that life should never be taken wantonly. These different warriors seek different Gods. Ares, God of War revels in the bloodletting, but his sister, Athena, Goddess of Wisdom, is patron to those who fight with dignity, and only when there is no other alternative.\\n\\nFavored daughter of Zeus, wise as ten thousand scholars, just as the scales themselves; Athena is a paragon of incorruptible virtue, and worshipped with righteous fervor. So revered is she that Athens, greatest city in all the world, is named for her, and regal temples adorn the countryside in her honor, each tended by loyal priestesses. To Athena, a life is a precious thing that need not be wasted in frivolous battle. Bloodthirsty Ares, on the other hand, is reviled by their father and chained by his ravenous subjects.\\n\\nAt the Siege of Troy, Ares disobeyed Zeus and joined with the battle, fighting for the mortal Trojans. Athena rose to stop him, indirectly championing the Greeks, but directly keeping the order of divine law. Their fierce battle clashed in unspeakable proportions, ending only when Ares limped from the battle field, cowed by his sister and rival. With Ares diminished, the tide of the war shifted and the heroes of the Greek Army toppled Troy.\\n\\nIn times of war, prayers are sent to both Gods. Ares, for bloodstained victory, Athena for honor, valor, and the wisdom to fight with dignity. Make no mistake, these are times of war, and Ares has already answered the call to arms. Athena, ever cautious with lives, goes to battle without eagerness, but solemn necessity, for the Goddess of Wisdom knows honor is for the living. The dead have no need of it.","name":"Athena","pantheon":"Greek","roles":["Guardian"],"title":"Goddess of Wisdom"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/summon-suku.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/feather-step.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/moonlight-charge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/gravity-surge.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/initiative.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/awilix.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/awilix.jpg","lore":"Pale white shines the light from her sentinel high above Earth. She watches, the eye that pierces shadow, and listens with the ears of birds and beasts that use the darkness to hunt and revel. As Queen of the Night, she is known; the Goddess of the Moon, Awilix.\\n\\nThey say the sun is her lover, and from his light does she shine, but those that say so have never beheld her. Left unrestrained, the sun burns skin, scorches the land, blinds the eyes. Moonlight does no such thing. Like soft white petals it blankets the night, casting the world into mystical illumination. Never has it brought calamity or ruin, only the chance to see where once there was none. She is no different. Her mysterious radiance needs no other to shine.\\n\\nThese days, the night is less welcoming. Those loyal followers, the jaguars, whose whispered roars bellow into the silence of her domain, prowl at her command. While it is, no doubt, beyond the understanding of mortals, the very moonlight is threatened. A war unlike any before it would end all things. For once that pale white will glimmer on the ugliness of bloodshed, for the night belongs to Awilix.","name":"Awilix","pantheon":"Maya","roles":["Assassin"],"title":"Goddess of the Moon"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wild-witchcraft.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/babas-brew.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/blast-off.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/home-sweet-home.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/creeping-cabin.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/baba-yaga.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/baba-yaga.jpg","lore":"It is an old story. Perhaps the oldest story there is. In the dark woods, there is a witch called Baba Yaga. Sometimes she is a mother. Sometimes she is a daughter. Sometimes she is cruel and sometimes, kind. But always, Baba Yaga is cunning. And there is always a price to pay for dealing with her, if you are brave enough – or desperate enough – to seek her out.\\n\\nIt is said that Baba Yaga waits for travellers in her house atop its gnarled chicken legs, behind a fence made of human bones. If you are brave enough to pass through the fence and enter the house you will see her stretched out across the interior, looming over her stove, or reaching out from one corner to another. Or, if you are in the woods late at night, you might see her flying overhead in her mortar and pestle and the hear the thunderous tramp of the chicken-legged house as it pursues its mistress.\\n\\nRegardless, she is an ugly creature with a long nose and cruel, iron teeth, and her eyes gleam with malice. But despite her inherent malevolence, she does not interfere with others without first being approached – or provoked. If you are foolish enough to seek her, she might well punish you for your effrontery before aiding you, or aid you and then tear you to pieces because it amuses her to do so. And sometimes, very rarely, she helps without harm.\\n\\nBut only when it suits her to do so.\\n\\nNow, as the world shudders on its axis and new horrors rise, Baba Yaga stirs in her long isolation. The gods have ignored her warnings for long enough, and if they will not ask for her help willingly, she will find a way to force them to do so…","name":"Baba Yaga","pantheon":"Slavic","roles":["Mage"],"title":"Witch of the Woods"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/chug.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/belly-flop.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/belch-of-the-gods.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/intoxicate.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/drunk-o-meter.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/bacchus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/bacchus.jpg","lore":"Eat, drink, and be merry, for tomorrow you may die. None adhere more vigorously to this creed than Bacchus, the Roman God of Wine, lewd behavior, and madness.\\n\\nAfter spending much of his formative years with his impressively intoxicated mentor Solinus, whom Bacchus loves like a father, the God of Wine is now a wanderer and teacher. He’s journeyed across all of Asia, through India, and finally back to Rome, spreading the “Mysteries of the Vine,” a ritual involving incredible amounts of wine to lower inhibitions, freeing one from social constraints, oppression of gender, sexual taboos, and the stresses of life. Quite the successful ritual, if ever there was one.\\n\\nMuch of this ritual seems to have come from Solinus, who is widely known to have vast, secret knowledge and the ability to predict the future, though only while completely drunk. The king Midas, covetous of this knowledge, captured Solinus, endeavoring to extract it by providing the scholar the finest food, drink, and entertainment he could muster. Bacchus finally tracked down his mentor in the court of Midas and discovered him well fed and cared for. Quickly, Midas lied, claiming Solinus had been lost and the king had taken him in. Seeing through the ruse, Bacchus offered the monarch a boon. Midas asked that anything he touched be turned to gold. Without hesitation, Bacchus granted this. He tested his new gift on a twig and stone and found them turned completely to gold. Elated, Midas called a feast, but found his food turned to gold in his hands and his daughter solidified at his touch. Starving and crazed, Midas begged Bacchus to remove the “gift.” Bacchus acquiesced, allowing the greedy king to wash his hands in the Pactolus river. As the golden touch left his hands, the river sands transformed to glittering gold.\\n\\nOf course, the product of continuous overindulgence in alcohol and deviant behavior, Bacchus could simply be insane.","name":"Bacchus","pantheon":"Roman","roles":["Guardian"],"title":"God of Wine"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/take-down.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eat-minion.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/butcher-blades.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/regurgitate.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/insatiable-hunger.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/bakasura.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/bakasura.jpg","lore":"A horrendous demon with a bottomless appetite for human flesh, Bakasura is a nightmare come to life.\\n\\nAfter committing countless atrocities, Bakasura has demonstrated no end to his depravity, no limits to his brutality, no sating his desire to slurp human meat, crunch bone, and guzzle hot blood. So many are his vile victories over mankind that they cannot be relayed here, yet it his defeat at the hands of a man that is worth the telling.\\n\\nAccording to the Hindu epic, the Mahabharata, the famous Pandava brothers were traveling in exile with their mother, Kunti, when they came to the village Ekachakra. Disguised as brahmins, they sought alms from the villagers in order to sustain themselves. They soon learned that a demon, Bakasura, was living outside the village, devouring the people as they passed through the woods. The chief went to the demon and begged that the feasting stop. In return, a cart of food would be sent to Bakasura each day. Bakasura consumed not only the provisions, but the person that brought the cart as well.\\n\\nAfter hearing this tale from a weeping woman whose son would bear the cart on the morrow, Kunti declared that her son Bhima, who possessed impossible strength and had slain demons before, would take the cart instead, as repayment to the kindness the villagers had shown their family.\\n\\nOnce in the forest, Bhima nonchalantly ate the food intended for Bakasura. Furious, Bakasura threatened to eat Bhima, which he just laughed off, goading the demon to attack him. All day they battled until Bhima finally slew the demon, tied him to the cart and dragged the body back to the village, where the people celebrated the victory in bewilderment.\\n\\nHunger, however, is a demon that cannot be defeated and, inevitably, Bakasura’s disgusting rumble will rise again, now more ravenous than ever and ready to feed.","name":"Bakasura","pantheon":"Hindu","roles":["Assassin"],"title":"the Great Devourer"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vivid-gaze.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/consign-spirits.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/wrap-it-up.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/life-of-the-party.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hysteria.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/baron-samedi.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/baron-samedi.jpg","lore":"Death. If you think that it means the end, then allow me to introduce you to someone.\\n\\nYou thought it was all over, but Baron Samedi is going to change your mind. The only fire here is in the water, so share a drink with him. Let the sights and sounds entrance you. Join the celebration, feel your pulse pounding so hard you’ve forgotten your heart stopped beating.\\n\\nForget what you think you know. There is a life after death, and Baron Samedi will be your guide. So come along and let Baron Samedi show you the wonders of a whole new world, and that even a god of death can be the life of the party.\\n\\nAfter all, what have you got to lose? ","name":"Baron Samedi","pantheon":"Voodoo","roles":["Mage"],"title":"God of Life and Death"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/pounce.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/razor-whip.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ensnaring-claw.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/guardians-of-bast.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tracking-scent.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/bastet.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/bastet.jpg","lore":"Reveling in the joys of life, Bastet, daughter of Ra, is the sensual embodiment of her feline form. This cat, however,  has the fiercest claws.\\n\\nCats are creatures that demand worship. They are regal, nonchalant, and insatiable. Though, as much as they languish in the sun and rumble with purrs of pleasure, cats are agile and deadly hunters. Mercilessly, they cull the populations of invasive vermin and stinging scorpions, protecting the home from vile invaders. Perhaps, the most troublesome enemy of the cat is the serpent, and there was no greater snake in the world than the horrendous Apep.\\n\\nCircling the world along the horizon line, Apep’s scaly girth waited in ambush each morning for Ra to rise and bring light to the world. To fend off this beast, Ra kept the company of his daughter, Bastet. Since time began, as Ra lifted into the Eastern sky, Bastet would spit and howl, claws bared against the treacherous Apep. Countless battles were fought, countless mornings faced uncertainty, until, at last, Bastet tore the foul serpent apart.\\n\\nWith her greatest enemy gone, Bastet is free to prowl as she pleases. Now, she is the guardian of home and hearth,  idol to women - especially those desiring children and exploring their sensuality - and patron of arts, wine, and any occasion of revelry. Like any cat, though, Bastet can still pounce without warning, shredding her enemies once her claws come out.","name":"Bastet","pantheon":"Egyptian","roles":["Assassin"],"title":"Goddess of Cats"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shield-bash.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bludgeon.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/scourge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/eagles-rally.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/master-of-war.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/bellona.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/bellona.jpg","lore":"Rome has forgotten her.\\n\\nBellona, the Goddess of War, took no time to build temples or gather worshippers. She favors only those for whom war is life; for that is where she thrives - not on the steps of hallowed basilicas or in whispered prayers, but in the blood-soaked mud, among the breathless armored troops, in the roar of victory.\\n\\nWhen Rome was young, Bellona ran with her armies, conquered her enemies, made her strong. As Rome aged and began to crumble, she fought only with her strongest and most cunning of worshippers, Lucius Cornelius Sulla.\\n\\nSulla rose through the ranks by accomplishing impossible deeds of heroism and ruthless prowess. His enemies feared him, his soldiers loved him, and everywhere he went, Bellona rode with him. Together they quelled the Germanic hordes, they broke the Social War, they sacked Athens. Sulla was utterly undefeatable, and it was the Goddess of War that made him so.\\n\\nBut the Roman Senate moved to displace Sulla and end his rise to glory.\\n\\n\"March on Rome,\" Bellona quietly urged, \"and you shall rise as no other.\"\\n\\nEmboldened, Sulla commanded his legions and took the city streets, Bellona at the fore, slaughtering the gladiator-slaves that stood against them. The Senate buckled. They cast the vote. Sulla became the first life-long dictator of Rome.\\n\\nDuring Sulla's reign, Bellona was worshipped for the Goddess she was. But Sulla had grown old. His wars were over. Bellona moved on, and Rome forgot.\\n\\nBut the forgotten are not gone. Gods clash in titanic conflict. It is in war she thrives. No one will forget Bellona the Goddess of War this time.","name":"Bellona","pantheon":"Roman","roles":["Warrior"],"title":"Goddess of War"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/seismic-crush.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/refraction-shield.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tremors.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/tectonic-shift.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shadow-zone.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cabrakan.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cabrakan.jpg","lore":"Feel the earth trembling beneath your feet? Only a titan of tremendous power could cause such fear. He is the Render of Stone, the Earthsunder. He is Cabrakan, Destroyer of Mountains.\\n\\nProud, boastful, confident to the point of arrogance, Cabrakan revels in his strength, tearing down what the earth has labored to rise. These traits – and worse - he inherited from his sire, the demon bird Seven Macaw.\\n\\nSeeking to end Seven Macaw's entire lineage, the Hero Twins tracked Cabrakan by his quaking footfalls. They found him in a valley, surrounded by great peaks, shattering rock into dust.\\n\\n\"How mighty you are,\" they told him, playing to his pride.\\n\\n\"I am,\" he boasted.\\n\\n\"Can you shatter that distant mountain?\" they asked.\\n\\n\"Of course,\" Cabrakan roared.\\n\\n\"You must be hungry,\" the Hero Twins offered.\\n\\n\"Always!\"\\n\\nAnd so they shot a bird from the sky for the giant to feast upon, yet as they turned the carcass over the flame, Hun-apu coated it with poisonous mud.\\n\\nWithout a thought, Cabrakan devoured the feast and rose, but already the poison had taken him. Teetering, losing sight, the Earthsunder collapsed. Mountains crumbled a final time. The valley became his tomb.\\n\\nYet vengeance is a cycle. Blood for blood, and a Titan is not so easily slain. The destroyer of mountains cannot be buried beneath stone, and Cabrakan's pained slumber is at an end. Bursting free, he now thunders across the field of war, seeking the Twins that played him the fool. Why stop at mountains when Cabrakan can destroy Gods.","name":"Cabrakan","pantheon":"Maya","roles":["Guardian"],"title":"Destroyer of Mountains"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/screech.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vampire-bats.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/devour.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bat-out-of-hell.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/essence-drinker.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/camazotz.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/camazotz.jpg","lore":"In darkness he lurks. Patient as the night in all its silence. For beneath his inverted perch scampers prey. Whether beast, mortal, or God matters not, only satisfying the unquenchable thrum in his veins for the boiling blood of another creature. But there is never enough. There will never be enough. So Camazotz, bat-god, whose bestial form matches that of his nocturnal servants, lurks in the darkness, waiting only to feed.\\n\\nOnce before, when the hero twins, Xbalanque and Hunahpu ventured to the Xibalba, stumbling blindly into the blackness of his cave, did Camazotz defeat a God. Finding themselves surrounded by a swarm of leathery bats, screeching and flapping with frenzied glee, the hero twins cowered and hid, hoping for dawn to light their way out. Patient, as always, Camazotz waited. Hunahpu, unable to hold out, lifted his head from concealment to check for light. Camazotz leapt, sliding through the blackness like a dagger through skin, and snatched Hunahpu’s head from his neck. Victorious, he presented his prize as a trophy to the other underworld Gods. However, come the morning light, Xbalanque fashioned a new head for his brother from a gourd and the two escaped while Camazotz was away.\\n\\nLong has Camazotz hung from his perch, watching as Gods clash and spill their sweet blood upon the earth. He’s waited, ever watchful, ever patient, for the moment to strike. Now that the moon has risen, and night has come, Camazotz has disappeared into the darkness. When next he’s seen, there will be blood on his fangs.","name":"Camazotz","pantheon":"Maya","roles":["Assassin"],"title":"Deadly God of Bats"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/paralyzing-spit.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ghastly-breath.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/soul-expulsion.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stygian-torment.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spirit-of-death.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cerberus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cerberus.jpg","lore":"Do not pass the black expanse of the river Styx if blood still flows in your veins. For there, upon the opposing shore, stands guard a beast of impossible animosity. Three fanged wolf heads will be your welcome, hackles raised, eyes like embers, burning green with ghostly flame. A sinuous tail whips with a mind all its own, barbed with the head of a serpent, forked tongue tasting the air. Should your body still be warm with life’s glow when you dare set foot upon the shore, Cerberus, Hound of Hell, will feast upon your flesh, consuming both body and soul.\\n\\nNo mercy resides in this creature. He is a monster, brought into this world by the Mother of Monsters, Echidna, for no other purpose than to guard the gates of hell. There he remains, eternally chained to the shrouded passage. None of the living may enter. None of the dead may leave.\\n\\nHades, master to Cerberus, has unbound his servant to the battlefield of the Gods. With his poisonous breath, his acidic spittle, his gaze that can turn flesh to stone, Cerberus now hunts freely in the world of the living, eager to drag everyone back down to hell.","name":"Cerberus","pantheon":"Greek","roles":["Guardian"],"title":"Warden of the Underworld"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shifter-of-seasons.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bramble-blast.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/horn-charge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-wild-hunt.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heavy-glaive.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cernunnos.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cernunnos.jpg","lore":"Standing upon the edge of the wooded realm of Cernunnos, one can feel the invitation and the threat. “Come and feast,” it calls. “Nature provides an abundance of crops and wild game.” Yet, the same voice turns dark. “Treat everything with due respect,” it warns. “This is not your home.” And, should one peer intently enough through the shadowed branches, a figure can be seen, horned as a stag, clothed in moss and leaves, eyes burning like untended embers. Cernunnos is master here, and although he has much to offer, he will not tolerate greed.\\n\\nTime turns on the Sacred Wheel, Spring to Summer, Summer to Autumn and Autumn at last to Winter. Cernunnos was there at the shaping of the wheel, born of the womb of the All Mother before Gods were Gods, when the land was shapeless. This wheel is not of his making. He is both master of it and slave to it, transforming with the seasons like the world beneath his feet. He bears a heavy metal torc around his neck as a permanent pledge of loyalty to this cycle of life and death that only he can drive.\\n\\nOnce, it was said, there was no break between his realm and this world. They were the same. Perhaps a time will come when the world shall once again be his. Then, all can walk among the whispering leaves. So long as they remain humble. For the arrogant, Cernunnos hunts. What are these other Gods? Guest or prey?","name":"Cernunnos","pantheon":"Celtic","roles":["Hunter"],"title":"The Horned God"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/thunder-strike.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/torrent.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rain-dance.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/storm-call.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overflow.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/chaac.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/chaac.jpg","lore":"Rain is life. Showers from above soak the earth, feeding seeds which grow into precious fruits and grains. Man and beast alike are sustained by this cycle. Without rain, this world would be barren and all living things would turn to dust. Thus is the power of Chaac, God of Rain. But, like all great power, it did not come without cost.\\n\\nIn mankind’s earliest days there were no farmers, so they starved beneath the sun. For days, Chaac sought a way to feed them. Deep in the mountains he discovered a golden boulder and cleft it with his mighty axe. Within was Maize, the crop that would change the Maya people forever, and Chaac was worshipped and adored for it.\\n\\nDrunk with pride, Chaac sought the object of his deepest desire, the wife of his brother. For a time, their affair remained secret, but that was not to last. Chaac’s brother, the Sun God, discovered them. Without a word, she dutifully returned to her husband and Chaac, realizing what he had done, let her go, but a rift formed between the two brothers that would never heal. In his grief, Chaac drove his axe into the sky, and from the wound tears of regret fell.\\n\\nSince then, Chaac has chosen a life free of pride and selfishness, devoting himself only to mankind. As a reminder of his greatest failing, he continues to cleave the heavens, washing the land in sustaining waters. Thus do crops grow. Thus do the people survive. Thus is the power of Chaac, God of Rain.","name":"Chaac","pantheon":"Maya","roles":["Warrior"],"title":"God of Rain"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/crescent-moon-dance.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/moonlit-waltz.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/moonflower-dance.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/waxing-moon.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/jade-rabbit.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/change.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/change.jpg","lore":"Not always born in the crucible of creation, sometimes Gods ascend by tragic happenstance. Such is the tale of Chang’e, Goddess of the Moon.\\n\\nAmong the immortals that lived in the Heavens, Chang’e was the most elegant dancer, like a dove on windswept currents. She drew the affection of the hero archer, Hou Yi, and the two were soon married. Everything was perfect.\\n\\nYet, beneath the Heavens, all was not well. Ten suns, the ten children of the Jade Emperor, rose to scorch the earth and boil the seas. Brave Hou Yi, bow in hand, shot nine from the sky, sparing only one. Though the world was saved, the Jade Emperor was furious his children were killed. In punishment, Hou Yi and Chang’e were made mortal.\\n\\nChang’e grew melancholy and danced no more. To restore their status in the Heavens, Hou Yi found the Elixir of Immortality, but thieves came to steal it while he was hunting. Chang’e struggled to hide the Elixir, but, in the end, was forced to drink it. Too much for one person, the Elixir gave her immortality, but it also swept her into the sky.\\n\\nSince then, Chang’e has lived on the moon, forbidden to see her husband, a Jade Rabbit her only companion. Yet, the Earth is once again in peril, and Chang’e finds herself upon the mortal surface. Perhaps, this is a second chance. If only she can save the world without angering the Jade Emperor, she can at last reunite with her husband.","name":"Chang'e","pantheon":"Chinese","roles":["Mage"],"title":"Faerie of the Moon"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spike-shot.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/capsize.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/whirlpool-form.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-maw-hungers.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/raging-tides.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/charybdis.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/charybdis.jpg","lore":"The dangers of the sea are many, but few so fearsome as the creature known as Charybdis. Ancient poems and songs speak of the destruction she has wreaked on any ship unlucky enough to pass too close to her turbulent waters.\\n\\nA sister in spirit if not blood to the nightmarish Scylla, Charybdis is a smasher of vessels where Scylla is an eater of men. She catches them in her whirlpool and breaks them into flinders, before drawing the pitiful remnants into the depths.\\n\\nOnce a daughter of Poseidon, she had the temerity to aid her father in his perennial feud with his brother, Zeus. At Poseidon’s behest, she used her control over the waters to engulf those lands closest to the sea – including those that belonged to Zeus.\\n\\nThis encroachment so angered the King of Olympus that he captured Charybdis. But such was Zeus’ wrath that he did not settle for mere imprisonment – rather, he transformed Charybdis into her current monstrous form as punishment for her defiance. He then cast her into the waters of a narrow strait, opposite the similarly cursed Scylla, and there chained her to the sea bed.\\n\\nIn the centuries since, Charybdis has taken out her frustrations upon any who dared pass over the swirling waters that hid her now-hideous form. The whirlpools created from her unquenchable thirst either crushed ships, or drove them into the teeth of Scylla. Together, the two terrorized the waters of their imprisoning strait – until, that is, Scylla was freed to bring horror to the lands of the gods. Charybdis was left alone.\\n\\nBut now, the chains that have held her fast since Zeus first cast her down have been broken. And mighty Charybdis is free at last to vent her rage on the gods who mistreated her so cruelly...","name":"Charybdis","pantheon":"Greek","roles":["Hunter"],"title":"The Ceaseless Whirlpool"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/crystallized-curses.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vicious-barrage.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/into-darkness.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/living-nightmare.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heart-of-cold.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/chernobog.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/chernobog.jpg","lore":"Sunlight’s last grasp reached up from the horizon like the clawing hand of a drowning man. Black against a blackening sky, the Great Mountain’s frozen peak loomed.\\n\\nIn the crannies and crevisses, in the darkened recesses of stone and ice, the denizens of nightmare crawled and squirmed. Silken shadows given form, withered hags of sorcerous witchcraft, leathery gargoyles, and skeletal fiends - all creeping ever upward, gathering for their unholy sabbath.\\n\\nNight at last swallowed light. Crystalline silence befell the summit. The wicked waited for their God. The pointed peak cracked and opened, two colossal bat-like wings spreading. He emerged, exultant.\\n\\nCreatures of every horror danced and cheered in twitches and fits, calling to their God. His jagged finger pointed and his minions of malice spewed forth to spread fear and death and darkness.\\n\\nChernobog, Lord of Darkness, grinned.","name":"Chernobog","pantheon":"Slavic","roles":["Hunter"],"title":"Lord of Darkness"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/training-exercise.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/masterful-shot.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/giddyup.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/centaurus.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/herbal-medicine.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/chiron.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/chiron.jpg","lore":"Chiron is a being of conflicted duality. Two opposites in one form. For all appearances, he is a centaur, bearing the torso of a man, and the body of a horse. Brutish, crude, and violent, the centaurs are not civilized creatures. Yet, Chiron is a scholar, a poet, an astrologer, and a teacher. And for all the wonder and glory of the world he tries to impart upon his illustrious students, Chiron, it seems, must constantly teach them the art of war. \\n\\nFame and legend are the hallmarks of his pupils. Perseus, who beheaded Medusa, Ajax, who battled bravely against Troy, and Achilles, who Chiron practically raised from infancy, all are figures of renown. But it is for their acts of violence, not art or science, for which songs are sung of these heroes. Chiron would prefer the world a more contemplative place where mankind adored nature and kindled bonds of friendship over scholarly discussions. \\n\\nThough, to his wizened eyes, the brink has been reached and the world he finds so fascinating tilts toward annihilation. Set aside are his books and scrolls, the easel and brush, and taken up are his bow and armor. On thunderous hooves Chiron gallops to the field. To save all that he holds dear, Chiron, the Great Teacher, will go to war.","name":"Chiron","pantheon":"Greek","roles":["Hunter"],"title":"The Great Teacher"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/time-rift.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/accelerate.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/stop-time.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rewind.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/time-lord.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/chronos.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/chronos.jpg","lore":"Existence is measured in age. How many years has a mortal lived? What was the construction date of the Parthenon? When were the cosmos formed? Time begins at birth, at creation. But, inevitably, time for all things comes to an end.\\n\\nExcept, of course, time itself.\\n\\nBearer of the clock of eternity, rimmed by signs of the Zodiac, the Keeper of Time, Chronos, counts every tick of the second hand, preventing interference with that essential forward momentum.\\n\\nIf he knows who or when the eternal clock was wound, Chronos does not tell, but upon the first stroke, he came to be. Emptiness was the ocean, then, and his only companion was Ananke, Queen of Fate. Together, their powers divided the vastness into heaven and earth and sea and sky. Thereafter, Chronos became an observer, the watchman of infinity.\\n\\nPatient to a fault, Chronos knows no urgency. He does not fear pain, or war, or death, for he is time itself and will outlast all. For this reason, his presence on the field of battle is alarming. This war between Gods must portend a conclusion so dire as to threaten the very existence of time. Perhaps, all the Gods should begin counting the seconds of the eternal clock. There may be few of them remaining.","name":"Chronos","pantheon":"Greek","roles":["Mage"],"title":"Keeper of Time"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sanity-break.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/the-mire.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rushing-terror.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/descend-into-madness.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/prey-on-fear.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cthulhu.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cthulhu.jpg","lore":"Ph'nglui mglw'nafh Cthulhu R'lyeh wgah-nagl fhtagn.\\n\\nIn his house at R’lyeh, dread Cthulhu waits dreaming. For him the sleep of aeons is as but a momentary stillness, and in his dreams he speaks to those who would listen. He erodes the minds of the weak, and emboldens the mad. The wind gibbers with his voice, and the earth rumbles with his thoughts.\\n\\nIä! Iä! Cthulhu fhtagn!\\n\\nHe once ruled where the feeble gods of Earth rule now, and where they now rule he will rule again. For his hand is at their throats, and they see him not. After summer is winter, and after winter, summer. He waits patient and potent, for the stars to be right.\\n\\nIä! Iä! Cthulhu fhtagn!\\n\\nNor is he alone in his waiting, for there are those who would worship him, hidden in distant wastes and dark places. There they make ready for the time when they will liberate their master from his long sleep with their prayers. Great Cthulhu will awaken to bring the whole of the earth under his sway once more and to teach man new ways to shout and kill.\\n\\nIä! Iä! Cthulhu fhtagn!\\n\\nNow, as the stars move into their foretold conjunctions, and the great tree withers, R’lyeh rises from the sea and great Cthulhu frenzies forth to reassert his ancient dominion. He plants seeds of madness in the minds of the dreamers, and calls to those who would serve him.\\n\\nIä! Iä! Cthulhu fhtagn!\\n\\nThe old gods will fall before him as he shatters the chains of reason, and commands lunacy to rush forth upon the world. Kings will be made mad, the mad will become kings and not even the dead will be spared his wrath.\\n\\nIä! Iä! Cthulhu fhtagn!\\n\\nThe stars are right. Cthulhu rises.\\n\\nIä! Iä! Cthulhu fhtagn!","name":"Cthulhu","pantheon":"Great Old Ones","roles":["Guardian"],"title":"The Great Dreamer"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/barbed-spear.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/vent-anger.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/salmons-leap.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/spear-of-mortal-pain.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/berserk.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cu-chulainn.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cu-chulainn.jpg","lore":"Thrice born child of Gods and Kings, Cú Chulainn is legend brought to life. A warrior without equal that, alone, held an army at bay; a man of will and courage that resisted both the allure and wrath of the Morrigan; a figure of tragic prophecy, destined for greatness and an early grave. So many legends are there of his achievements they could be spoken for days and yet still more be told. And yet throughout his triumphs, his death loomed constant, foretold and certain.\\n\\nIn his early years, while still bearing the name Sétanta, he was already an impressive individual, catching the attention of King Conchobar with feats of strength and agility. Conchobar invited the boy to a feast hosted by the smith, Culann. Left unchained by mistake, Culann’s fearsome guard dog assailed Sétanta when he arrived. With only his bare hands, the boy defended himself and slew the beast. Ashamed, Sétanta swore to Culann he would personally train a new dog and would guard his home in the interim. Impressed, the druid Cathbad declared Sétanta would now be called the Cú Chulainn, the Hound of Culann.\\n\\nThis was the birth of a hero, but his death was yet bound in prophecy. Cathbad, the same druid that named him, promised a group of boys, “Any that take up arms this day will become legends.” Seeking greatness, Cú Chulainn raced off to find weapons before hearing more. He saw years of victory, of achieving the impossible, of becoming a legend before him. Cathbad, however, was devastated, for he knew that those that took up arms that day were also foretold to die young.","name":"Cu Chulainn","pantheon":"Celtic","roles":["Warrior"],"title":"Hound of Ulster"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/heart-bomb.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/share-the-love.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/flutter.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fields-of-love.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lovestruck.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/cupid.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/cupid.jpg","lore":"An arrow from the bow of Cupid, chubby little God of Love, will make anyone give in to passion and desire.\\n\\nCupid, as he was called by the Romans, is the son of Venus and Mars, or Aphrodite and Ares as they were known by the Greeks. He is the God of love and desire, flying about on feathery wings, shooting passion-tipped arrows at all the creatures of the earth. When struck with one of his arrows, man and beast alike fall in love with the next thing they see. Without Cupid’s steady aim, there would be no love in this world, which is precisely what happened when Cupid fell in love himself.\\n\\nPsyche was a mortal of astounding beauty, which made Venus venomously jealous. Venus ordered Cupid to sting her with an arrow, then arranged for Psyche to fall in love with a spider. Invisible, Cupid reluctantly went to Psyche as she slept, yet, she woke suddenly and saw right through Cupid’s invisibility. Surprised, Cupid cut himself on his own arrow and fell immediately in love with Psyche.\\n\\nFurious, Venus would not let Cupid marry Psyche, so Cupid stopped shooting arrows, people stopped falling in love and stopped worshipping Venus. Panicked, the Goddess of beauty relented and Cupid went back to work. Psyche was whisked to a secret location. Cupid visited her only at night so she could not see who he was. Fearing him to be a terrible monster, Psyche waited for Cupid to fall asleep and lit a lantern. Surprised at what she found, she accidentally scraped one of Cupid’s arrows and fell in love with him.\\n\\nVenus was displeased and forbade Psyche to see her son, forcing her to complete a series of impossible challenges that Psyche overcame only with mystical help. Finally, Cupid begged Jupiter (Zeus) to intervene. Casually, he declared Psyche and Cupid could be together. Thus, Cupid fed Psyche the drink of ambrosia that made her immortal and the God of love got to live happily ever after.","name":"Cupid","pantheon":"Roman","roles":["Hunter"],"title":"God of Love"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/horrible-burns.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/one-thousand-cuts.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/trickster-spirit.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/paolao.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/torture-blades.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/da-ji.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/da-ji.jpg","lore":"Emperor Zhou’s desire for the Goddess Nu Wa was considered an obsession, perhaps even madness. She sent signs and missives to reject him, but Zhou would not be dissuaded. At night, he slipped into her temple and scrawled poetry across the walls espousing his undying love. This defilement could not go unanswered. Nu Wa summoned the most conniving and wicked Fox Spirit she could and thrust it upon the Emperor with intent to spiral his life into misery. Little did Nu Wa know what she had just unleashed.\\n\\nFor thousands of years the nine-tailed Fox spirit had lived, biding its time, honing its malicious appetites. Finally in human form, it assumed the irresistible guise of Da Ji, and to Emperor Zhou, she could do no wrong.\\n\\nWith free reign of the Empire and its people, Da Ji reveled in torture and malice. She took delight in their screams of pain as she danced to playful music composed at her command, the musicians trembling for every note.\\n\\nSo grievous did these atrocities grow that the people rose up and overthrew their ruler. They stormed the gates, toppled the throne, and pursued Zhou to his bed chamber, where the crazed emperor finally took his own life.\\n\\nYet, Da Ji managed to escape and conceal herself. Now she joins the fray, not to save the universe, nor empower her pantheon, but instead to soak up every last cry of anguish from her enemies.","name":"Da Ji","pantheon":"Chinese","roles":["Assassin"],"title":"The Nine-Tailed Fox"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/fools-gold.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/alluring-
