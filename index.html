ulcan that forged them. When the very earth rumbles and mountains erupt in searing flame, it is Vulcan’s rage that burns. Smith of the Gods, Vulcan crafts with fire and forge as an artist would with paint and brush.\\n\\nAs an infant, so hideous was Vulcan that his disgusted mother, Juno, cast him into the sea from the heights of Mount Olympus. So great was the fall, it smashed one of Vulcan’s legs, a wound from which he would never recover.  Beneath the waves, a sea nymph, Thetis, rescued the child-god and raised him as her own. As Vulcan grew, he ventured to the surface and discovered fire and the art of smithing. His natural talents emerged and he forged wondrous jewels for his adopted mother.\\n\\nSummoned to a gala on Mount Olympus, Thetis wore Vulcan’s glittering gifts, but when Juno discovered Vulcan had made them, she jealously demanded he return to Mount Olympus. Angrily, Vulcan refused. In his stead, he sent a magnificent throne of gold and gems that imprisoned Juno when she sat upon it.\\n\\nFor three days Juno was so entombed, and would have remained so had not Jupiter, Vulcan’s father, interjected. To Vulcan he offered an exchange, Juno’s freedom for the hand of Venus, the most beautiful Goddess of Love. Vulcan agreed.\\n\\nThough his vengeance was served cold, the fire of spite still burns in Vulcan’s chest. Unable to truly forgive, he loses himself at the forge. None of the wondrous chariots, jewelry or weapons he crafts can ever fill the hurt in his heart, but each one is worthy of a God.","name":"Vulcan","pantheon":"Roman","roles":["Mage"],"title":"Smith of the Gods"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/branching-bola.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/poison-darts.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rising-jaguar.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/darkest-of-nights.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/dead-of-night.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/xbalanque.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/xbalanque.jpg","lore":"Xbalanque was born with vengeance in his heart.\\n\\nAs one of the Hero Twins, Xbalanque, and his brother Hunahpu, knew their lives would eventually force them to face the Lords of Death, chiefs of the Underworld who murdered their father, but first they would need to master the arts of hunting with blowguns and the violent ball game Pitz.\\n\\nAs a test of their strength, they decided to defeat the vain and evil bird-lord, Seven Macaw, who declared himself the Sun and the Moon and replaced his teeth with glistening jewels.\\n\\nThe Hero Twins fired their blowguns at the perching bird-lord, knocking out several of Seven Macaw’s glittering teeth. Ferociously he came at them, but only snatched Hunahpu and tore off the boy’s arm. Cleverly, the twins enlisted the aid of an elderly couple and advised them to pose as dentists. Seven Macaw sought to ease the pain in his mouth, so, as they were instructed, the dentists pulled the rest of Seven Macaw’s teeth and replaced them with white corn. So humiliated was the great bird that he died of despair.\\n\\nIt would be many years and several trials later that, at last, the Hero Twins were able to challenge the Lords of Death and avenge their father, but their final victory allowed them to ascend to the heavens, where Xbalanque was immortalized as the moon, lighting the night for clever hunters everywhere.","name":"Xbalanque","pantheon":"Maya","roles":["Hunter"],"title":"Hidden Jaguar Sun"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/furious-roar.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/hook-slam.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/sky-cutting-axe.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/whirlwind-of-rage-and-steel.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/smouldering-rage.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/xing-tian.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/xing-tian.jpg","lore":"Hear the legends of the headless warrior from the East, for they are not tales of a murderous monster, but a man that would not be undone by defeat or even death.\\n\\nLong ago, three Emperors warred for supremacy over a young nation. Barely clinging to dominance, the Flame Emperor deployed his greatest general, the warrior-poet Xing Tian. Tirelessly he battled the other would-be Emperors but the size of their armies were too great, their weapons too sharp. Xing Tian returned to his lord in defeat but with spirit unbroken. He begged to ride out and meet the enemy once more, but the Flame Emperor refused. His reign was over, his life forfeit to the Yellow Emperor.\\n\\nUnwilling to give in despite the loss of his lord, Xing Tian rallied the Flame Army for a final siege of the Yellow Emperor’s Sky Palace. While the soldiers crashed around them, Xing Tian met the Yellow Emperor in single combat, the two titans trading blows up the upon the mountaintop. High upon the snow-capped peak the Yellow Emperor’s blade struck true, beheading Xing Tian.\\n\\nWas it days that passed, or years? It is unknown, but there, at the base of the mountain, Xing Tian awoke. A new face burned from his chest. The fire to battle renewed, the now headless Xing Tian rose to fight again.\\n\\nFor Xing Tian there is no defeat; there is no death. As long as there is a battle to be fought he will never surrender. And he will never die.","name":"Xing Tian","pantheon":"Chinese","roles":["Guardian"],"title":"The Relentless"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/bouncing-bubble.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/mending-waters.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/riptide.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/rivers-rebuke.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/omi.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/yemoja.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/yemoja.jpg","lore":"Every river must have its beginning, and that beginning is Yemoja. The Goddess of the Ogun River is mother to the Yoruba pantheon, and from her floodwaters sprang the first mortals. She is the mistress of all rivers and the eternal guardian of the ancient mysteries of life itself. Fishermen and sailors seek her blessings, for she is the protector of all who travel on water. Mothers-to-be ask for her aid, for she is the patron spirit of women and governs everything pertaining to the feminine – especially childbirth. After all, who better than the mother of all life to oversee its continuation?\\n\\nAs such, she considers herself the caretaker of all that lives. She cares deeply for all of her children, be they mortal or god, comforting them and cleansing them of their sorrows. At Yemoja’s blessed touch, wounds are healed and sickness is cured. \\n\\nBut even her kindness has its limits and should she be roused to anger, she becomes as violent and as destructive as the most turbulent of floodwaters. All who would dare stand against her are swept aside by her roaring fury. To challenge Yemoja is to challenge the river itself. But like the rivers, Yemoja has ever followed her own course.\\n\\nShe keeps to her spheres of influence and attends only those who seek out her blessings. Content in her solitude, she has maintained her distance from the affairs of the gods, for war does not interest her and she has power enough to suit her. But the advent of Olorun has changed things and even rivers must turn with the will of the heavens.\\n\\nAnd now, as her children cry out for aid, the river rises and Yemoja rises with it.","name":"Yemoja","pantheon":"Yoruba","roles":["Guardian"],"title":"Goddess of Rivers"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/ice-wall.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/glacial-strike.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/frost-breath.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/shards-of-ice.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/frostbite.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/ymir.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/ymir.jpg","lore":"As far as it is known, Ymir has long been dead.\\n\\nIn Midgard, in the North, it is believed that Ymir’s skull is the sky, his flesh the earth, and his blood the sea. Though, these claims could merely be the boasting of proud Odin and his brothers, who take credit for slaying the first jotunn and fashioning the earth from his body parts.\\n\\nAt the beginning of time, the Realm of Fire, Muspell, and the Realm of Ice, Niflheim met at the place called Ginnungagap; the void of space. Steam rose and froze again, and from that primordial mixture, Ymir, King of the Frost Giants took shape. From his body dripped other beings that would become the ancestors of Gods, Men, Dwarves, and of course, Giants. Even the mighty Odin must claim Ymir as his grandfather. Yet Ymir, like all giants, was an evil creature and led his Giant brethren against the Gods. After ages of warfare, Odin and his brothers slew the Giant-King and forged the world from his remains.\\n\\nYet there are other whispers. Rumors that Ymir, though not a God, was still a Primeval Being, and as such cannot truly be destroyed. Perhaps he only lies dormant in Niflheim, the realm of ice, eager to return and wreak vengeance upon Odin in his kin.","name":"Ymir","pantheon":"Norse","roles":["Guardian"],"title":"Father of the Frost Giants"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/chain-lightning.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/aegis-assault.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/detonate-charge.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/lightning-storm.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/overcharge.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/zeus.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/zeus.jpg","lore":"King of Gods, Zeus strives for fairness and justice, but will not hesitate to call down the thunder when there’s smiting to be done!\\n\\nZeus’ father, the Titan Cronus, immediately swallowed his children after birth so that none could overthrow him as he had his own father. When Zeus was born, Rhea, Zeus’ mother, hid the child from Cronus and gave the Titan a rock in swaddling clothes, which he swallowed instead. In secret, Zeus grew up on the isle of Crete until he was old and strong enough to challenge his father. During their battle, Zeus slit open Cronus’ stomach, allowing his swallowed brothers and sisters to escape, slaying the Titan. Then, Zeus released the Cyclops and other beings Cronus had kept imprisoned. In gratitude, the Cyclops awarded Zeus control over lightning.\\n\\nWith his two brothers, Poseidon and Hades, the three Gods drew lots to decide command of creation. Poseidon became king of the sea, Hades the underworld, and Zeus the sky. From his golden throne atop Mount Olympus, Zeus now rules Gods and Men with his wife Hera, upholding justice, hospitality, oaths, and honesty to all under his domain.\\n\\nYet, Zeus is a restless God, and while he holds high expectations for others, he does not keep those standards for himself. Chiefly, Zeus is nearly infamous for several infidelities to his wife which have resulted in dozens of children beget by other women, most famous of which are Hercules, Artemis, and Athena. Such wanton unfaithfulness is the source of great jealousy from Hera, though as King, Zeus can ultimately do as he wishes.\\n\\nWeather is dictated by the Thunder God’s mood. When in a fair temperament, the sky is clear, bright and warm. When Zeus’ anger flares, black clouds roll in, lightning streaks the sky and thunder shakes the very ground. Lately, Zeus has been furious.","name":"Zeus","pantheon":"Greek","roles":["Mage"],"title":"God of the Sky"},{"ability1URL":"https://webcdn.hirezstudios.com/smite/god-abilities/expose-evil.jpg","ability2URL":"https://webcdn.hirezstudios.com/smite/god-abilities/exorcism.jpg","ability3URL":"https://webcdn.hirezstudios.com/smite/god-abilities/book-of-demons.jpg","ability4URL":"https://webcdn.hirezstudios.com/smite/god-abilities/recall-demons.jpg","ability5URL":"https://webcdn.hirezstudios.com/smite/god-abilities/demon-bag.jpg","godCardURL":"https://webcdn.hirezstudios.com/smite/god-cards/zhong-kui.jpg","godIconURL":"https://webcdn.hirezstudios.com/smite/god-icons/zhong-kui.jpg","lore":"In this world resides powerful evil, intent on destroying everything crafted by Gods and Men. Without guardians of equal strength, all would have fallen long ago. Zhong Kui was once a man with ambitions no greater than scholastic excellence, but in death became the perfect shield against evil’s onslaught.\\n\\nZhong Kui sought to pit his brilliant mind against the Imperial Examinations, tests to select councilors for the Emperor. With ease, he passed, but when the emperor saw his hideous face, he cast the scholar out. Offended, furious, Zhong Kui hurled himself repeatedly at the palace gates until his body was broken.\\n\\nFor his crime, Zhong Kui’s soul was judged by the King of Hell, but where the Emperor saw only ugliness, the King of Hell saw potential armed with genius. Zhong Kui was appointed Lord of Demons, tasked to forever hunt and ensnare the evils of the world.\\n\\nFor centuries, home owners and shopkeepers have adorned their buildings with Zhong Kui’s likeness, for that visage that once horrified the emperor now glares with purpose at unwelcome demons. Yet these days, it is not just shops and homes in peril, but the whole world. It does not take a mind like Zhong Kui’s to see evil’s hand in this War of the Gods. The time has come to bring these demons to task, and Zhong Kui means to smite them all.","name":"Zhong Kui","pantheon":"Chinese","roles":["Mage"],"title":"the Demon Queller"}],"roles":["Any","Warrior","Mage","Hunter","Assassin","Guardian"]},"__N_SSG":true},"page":"/","query":{},"buildId":"hExsxd4TueIZHyfHBdc51","assetPrefix":"https://hphothong.github.io/smite","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
